function handleBookingRequest(reqId, decision){
  const req = bookingRequests.find(r=>r.id===reqId);
  if(!req) return;
  req.status = decision;
  if(decision==='accepted'){
    // Add to reservations
    const h = hotels.find(x=>x.id===req.hotelId);
    const nights = Math.round((new Date(req.checkOut)-new Date(req.checkIn))/86400000);
    appState.reservations.unshift({
      id:'SF-'+Math.random().toString(36).substr(2,8).toUpperCase(),
      hotelId:req.hotelId, name:req.guestName, email:'',
      checkIn:req.checkIn, checkOut:req.checkOut, rooms:1, nights,
      total:req.total, status:'confirmée', paymentMethod:'Paiement sur place',
      createdAt:new Date().toISOString().split('T')[0]
    });
    showToast('✅ Demande acceptée ! Réservation ajoutée.','var(--green)');
  } else {
    showToast('Demande refusée.','var(--gray-700)');
  }
  navigate('booking-requests');
}

function renderCalGrid(year, month, cal, today, firstDay, daysInMonth){
  const grid = document.getElementById('cal-grid');
  if(!grid) return;
  grid.innerHTML = '';

  // Empty cells before first day
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  for(let i=0; i<offset; i++){
    const empty = document.createElement('div');
    grid.appendChild(empty);
  }

  // Day cells
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = year+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isBlocked = cal.blocked.includes(dateStr);
    const isToday   = dateStr === today;
    const isPast    = dateStr < today;
    const price     = cal.priceOverrides[dateStr];

    const cell = document.createElement('div');
    cell.style.cssText =
      'text-align:center;padding:10px 4px;border-radius:6px;font-size:13px;font-weight:'+(isToday?'800':'400')+
      ';transition:background .15s,transform .1s;'+
      'background:'+(isBlocked?'var(--red)':isPast?'var(--gray-100)':'#e8f4ff')+';'+
      'color:'+(isBlocked?'#fff':isPast?'var(--gray-300)':isToday?'var(--blue)':'var(--gray-900)')+';'+
      'border:'+(isToday?'2px solid var(--blue)':'1px solid '+(isBlocked?'transparent':isPast?'var(--gray-100)':'#b3d4f0'))+';'+
      'cursor:'+(isPast?'default':'pointer')+';';

    cell.textContent = day;
    if(isBlocked) cell.classList.add('cal-blocked');
    cell.dataset.date = dateStr;

    if(price){
      const priceEl = document.createElement('div');
      priceEl.style.cssText = 'font-size:9px;color:'+(isBlocked?'#fff':'var(--blue)')+';font-weight:700;margin-top:2px;';
      priceEl.textContent = price+'€';
      cell.appendChild(priceEl);
    }

    if(!isPast){
      cell.addEventListener('click', function(){
        toggleBlockDay(this.dataset.date);
      });
      cell.addEventListener('mouseenter', function(){
        if(!this.classList.contains('cal-blocked'))
          this.style.background='#c8e6ff';
      });
      cell.addEventListener('mouseleave', function(){
        if(!this.classList.contains('cal-blocked'))
          this.style.background='#e8f4ff';
      });
    }

    grid.appendChild(cell);
  }
}

function updateCalStats(cal, daysInMonth){
  const el = document.getElementById('cal-stats');
  if(!el) return;
  const blocked = cal.blocked.length;
  const avail   = daysInMonth - blocked;
  const rate    = Math.round(avail/daysInMonth*100);
  el.innerHTML = [
    {label:'Nuits disponibles', val:avail,     color:'var(--green)'},
    {label:'Nuits bloquées',    val:blocked,   color:'var(--red)'},
    {label:'Taux disponibilité',val:rate+'%',  color:'var(--blue)'},

function navCalendar(dir){
  let {year,month} = appState.calendarView;
  month += dir;
  if(month>12){month=1;year++;}
  if(month<1){month=12;year--;}
  appState.calendarView={year,month};
  // Update month label
  const cal = getCalForAnnonce(appState.selectedAnnonceId || (appState.myAnnonces[0] && appState.myAnnonces[0].id) || 'ANN-K7L8M9N0');
  const firstDay = new Date(year,month-1,1).getDay();
  const daysInMonth = new Date(year,month,0).getDate();
  const today = new Date().toISOString().split('T')[0];
  const monthName = new Date(year,month-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  // Update label
  const labels = document.querySelectorAll('.cal-month-label');
  labels.forEach(el=>{ el.textContent = monthName; el.style.textTransform='capitalize'; });
  // Re-render grid
  renderCalGrid(year, month, cal, today, firstDay, daysInMonth);
  updateCalStats(cal, daysInMonth);
  // Fallback: if label not found, full re-render
  if(!document.getElementById('cal-grid')) navigate('host-calendar');
}

function toggleBlockDay(dateStr){
  const cal = getCalForAnnonce(appState.selectedAnnonceId || (appState.myAnnonces[0] && appState.myAnnonces[0].id) || 'ANN-K7L8M9N0');
  const wasBlocked = cal.blocked.includes(dateStr);
  if(wasBlocked){
    cal.blocked = cal.blocked.filter(d=>d!==dateStr);
    showToast('📅 Disponible','var(--green)');
  } else {
    cal.blocked.push(dateStr);
    showToast('🔒 Bloqué','var(--gray-700)');
  }
  // Update cell style
  const cell = document.querySelector('[data-date="'+dateStr+'"]');
  if(cell){
    const nowBlocked = cal.blocked.includes(dateStr);
    cell.style.background = nowBlocked ? 'var(--red)' : '#e8f4ff';
    cell.style.color = nowBlocked ? '#fff' : 'var(--gray-900)';
    cell.style.border = nowBlocked ? '1px solid transparent' : '1px solid #b3d4f0';
    if(nowBlocked){ cell.classList.add('cal-blocked'); }
    else { cell.classList.remove('cal-blocked'); }
  }
  // Update stats
  const daysInMonth = new Date(appState.calendarView.year, appState.calendarView.month, 0).getDate();
  updateCalStats(cal, daysInMonth);
}

function validateReqDates(){
  const ciEl = document.getElementById('req-checkin');
  const coEl = document.getElementById('req-checkout');
  if(!ciEl||!coEl) return;
  const ci=ciEl.value, co=coEl.value;
  if(ci && co && co<=ci){
    const minCo=new Date(ci); minCo.setDate(minCo.getDate()+1);
    coEl.value=minCo.toISOString().split('T')[0];
    showToast('📅 Date de départ ajustée','var(--blue)');
  }
  if(ci) coEl.min=new Date(new Date(ci).getTime()+86400000).toISOString().split('T')[0];
}

function submitBookingRequest(hId){
  const checkIn = document.getElementById('req-checkin')?.value;
  const checkOut = document.getElementById('req-checkout')?.value;
  const guests = parseInt(document.getElementById('req-guests')?.value||1);
  const message = document.getElementById('req-message')?.value?.trim();
  if(!checkIn||!checkOut){showToast('⚠️ Choisissez vos dates','var(--red)');return;}
  if(!message){showToast('⚠️ Écrivez un message à l\'hôte','var(--red)');return;}
  const h = hotels.find(x=>x.id===hId);
  const nights = Math.max(1,Math.round((new Date(checkOut)-new Date(checkIn))/86400000));
  const total = h ? h.price*nights : 0;
  const u = auth.currentUser;
  const initials = u.firstName[0]+u.lastName[0];
  const newReq = {
    id:'REQ-'+Math.random().toString(36).substr(2,6).toUpperCase(),
    hotelId:hId, guestId:u.id,
    guestName:u.firstName+' '+u.lastName, guestAvatar:initials,
    checkIn, checkOut, guests, total, message,
    status:'pending', createdAt:new Date().toISOString().split('T')[0]
  };
  bookingRequests.unshift(newReq);
  document.getElementById('modal-root').innerHTML='';
  showToast('📨 Demande envoyée ! L\'hôte dispose de 24h pour répondre.','var(--blue)');
}

function initBlockedDatesPicker(hId){
  const blocked = getBlockedDatesForHotel(hId);
  if(!blocked.length) return;

  // Show blocked dates info
  const infoEl = document.getElementById('bk-blocked-info');
  const textEl = document.getElementById('bk-blocked-text');
  if(infoEl && textEl){
    // Group consecutive dates
    const sorted = [...blocked].sort();
    const today = new Date().toISOString().split('T')[0];
    const future = sorted.filter(d=>d>=today);
    if(future.length > 0){
      const count = future.length;
      textEl.textContent = count+' date'+(count>1?'s':'')+' indisponible'+(count>1?'s':'')+' sur ce logement.';
      infoEl.style.display = 'block';
    }
  }

  // Render mini-calendar showing current month + next month
  const miniCal = document.getElementById('bk-mini-cal');
  if(!miniCal) return;

  const today = new Date();

  // Determine which months to show based on selected dates
  function getCalMonths(){
    const ciVal = document.getElementById('bk-ci')?.value;
    const coVal = document.getElementById('bk-co')?.value;
    // Use the earliest of: checkin, checkout, or today
    let baseDate = today;
    if(ciVal) baseDate = new Date(ciVal) < today ? today : new Date(ciVal);
    const m1 = {year: baseDate.getFullYear(), month: baseDate.getMonth()};
    const m2Date = new Date(baseDate.getFullYear(), baseDate.getMonth()+1, 1);
    const m2 = {year: m2Date.getFullYear(), month: m2Date.getMonth()};
    return [m1, m2];
  }

  function refreshMiniCal(){
    const months = getCalMonths();
    miniCal.innerHTML = '<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gray-500);letter-spacing:.3px;margin-bottom:8px;">📅 Disponibilités</div>'
      + months.map(({year,month})=>renderMiniMonth(year, month, blocked, today)).join('')
      + '<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;">'
      + '<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-500);"><span style="width:12px;height:12px;border-radius:3px;background:#ffdddd;border:1px solid #ffaaaa;display:inline-block;"></span>Indisponible</span>'
      + '<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-500);"><span style="width:12px;height:12px;border-radius:3px;background:#e8f4ff;border:1px solid #b3d4f0;display:inline-block;"></span>Disponible</span>'
      + '</div>';
  }

  miniCal.style.display = 'block';
  refreshMiniCal();

  // Add event listeners to date inputs — refresh calendar + validate
  const ciEl = document.getElementById('bk-ci');
  const coEl = document.getElementById('bk-co');
  if(ciEl) ciEl.addEventListener('change', ()=>{ validateDateAgainstBlocked(hId); refreshMiniCal(); });
  if(coEl) coEl.addEventListener('change', ()=>{ validateDateAgainstBlocked(hId); refreshMiniCal(); });
}

function renderMiniMonth(year, month, blocked, today){
  const monthNames=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const todayStr = today.toISOString().split('T')[0];
  const days = ['L','M','M','J','V','S','D'];

  let html = '<div style="margin-bottom:10px;">';
  html += '<div style="font-size:12px;font-weight:700;text-align:center;margin-bottom:6px;color:var(--gray-700);">'
    + monthNames[month]+' '+year+'</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;">';
  // Day headers
  days.forEach(d=>{
    html += '<div style="text-align:center;font-size:9px;font-weight:700;color:var(--gray-400);padding:2px 0;">'+d+'</div>';
  });
  // Empty cells
  for(let i=0;i<offset;i++) html+='<div></div>';
  // Days
  for(let day=1;day<=daysInMonth;day++){
    const ds = year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isBlocked = blocked.includes(ds);
    const isPast = ds < todayStr;
    const bg = isBlocked ? '#ffdddd' : isPast ? '#f5f5f5' : '#e8f4ff';
    const color = isBlocked ? '#cc0000' : isPast ? '#cccccc' : 'var(--gray-700)';
    const border = isBlocked ? '1px solid #ffaaaa' : isPast ? '1px solid #eeeeee' : '1px solid #b3d4f0';
    const fw = ds===todayStr ? '800' : '400';
    html += '<div style="text-align:center;padding:3px 1px;font-size:10px;font-weight:'+fw
      +';background:'+bg+';color:'+color+';border:'+border
      +';border-radius:2px;">'
      +(isBlocked ? '<s>'+day+'</s>' : day)+'</div>';
  }
  html += '</div></div>';
  return html;
}

function validateDateAgainstBlocked(hId){
  const blocked = getBlockedDatesForHotel(hId);
  if(!blocked.length) return;
  const ci = document.getElementById('bk-ci')?.value;
  const co = document.getElementById('bk-co')?.value;
  const warnEl = document.getElementById('bk-avail-warn');

  // Check if selected checkin or checkout is a blocked date
  if(ci && blocked.includes(ci)){
    showToast('⛔ La date d\'arrivée est indisponible','var(--red)');
    if(warnEl) warnEl.style.display='flex';
    return;
  }
  if(co && blocked.includes(co)){
    showToast('⛔ La date de départ est indisponible','var(--red)');
    if(warnEl) warnEl.style.display='flex';
    return;
  }
  // Check range
  if(ci && co){
    const start = new Date(ci), end = new Date(co);
    for(let d=new Date(start); d<end; d.setDate(d.getDate()+1)){
      const ds = d.toISOString().split('T')[0];
      if(blocked.includes(ds)){
        if(warnEl) warnEl.style.display='flex';
        return;
      }
    }
    if(warnEl) warnEl.style.display='none';
  }
}

let currentAdminTab = 'overview';

function switchAdminTab(tab){
  currentAdminTab = tab;
  // Update tab styles
  document.querySelectorAll('[id^="atab-"]').forEach(btn=>{
    const active = btn.id === 'atab-'+tab;
    btn.style.background = active ? 'rgba(255,255,255,.15)' : 'transparent';
    btn.style.color = active ? '#fff' : 'rgba(255,255,255,.6)';
    btn.style.borderBottom = active ? '2px solid #febb02' : '2px solid transparent';
    btn.style.fontWeight = active ? '700' : '500';
  });
  // Rebuild content
  const today = new Date();
  const fmt = n => n.toLocaleString('fr-FR');
  const fmtEur = n => n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
  const fmtPct = (n,dec=1) => n.toFixed(dec)+'%';
  function spark(data,color='#0071c2',filled=false){
    const w=120,h=40,pad=4;
    const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
    const pts=data.map((v,i)=>{const x=pad+i*(w-2*pad)/(data.length-1);const y=h-pad-(v-min)/range*(h-2*pad);return x+','+y;}).join(' ');
    const last=pts.split(' ').slice(-1)[0];const lx=parseFloat(last.split(',')[0]),ly=parseFloat(last.split(',')[1]);
    const first=pts.split(' ')[0];
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${filled?`<polygon points="${first.split(',')[0]},${h} ${pts} ${lx},${h}" fill="${color}22"/>`:''}
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lx}" cy="${ly}" r="3.5" fill="${color}"/></svg>`;
  }
  function trend(base,vol=0.15,n=8){return Array.from({length:n},(_,i)=>Math.round(base*(1+Math.sin(i)*vol+(Math.random()-0.5)*vol)));}
  function kpiCard(label,value,sub,td,color='#0071c2',up=true){
    const arrow=up?'▲':'▼',arrowColor=up?'#1a7e4f':'#c00000';
    return `<div style="background:#fff;border:1px solid #e8ecf0;border-radius:12px;padding:16px;transition:box-shadow .2s;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,53,128,.12)'" onmouseout="this.style.boxShadow='none'">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:6px;">${label}</div>
      <div style="font-size:22px;font-weight:800;color:#111827;margin-bottom:4px;">${value}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:12px;color:${arrowColor};font-weight:600;">${arrow} ${sub}</span>
        ${td?spark(td,color,true):''}
      </div></div>`;
  }
  function secHeader(emoji,title,subtitle,bg='#003580'){
    return `<div style="display:flex;align-items:center;gap:12px;padding:16px 20px;background:${bg};border-radius:12px;margin-bottom:16px;">
      <div style="font-size:28px;">${emoji}</div>
      <div><div style="font-size:16px;font-weight:800;color:#fff;">${title}</div><div style="font-size:13px;color:rgba(255,255,255,.7);">${subtitle}</div></div>
    </div>`;
  }

  const allResa = appState.reservations||[];
  const confirmed = allResa.filter(r=>r.status==='confirmée');
  const totalGMV = confirmed.reduce((s,r)=>s+(r.total||0),0)||47320;
  const totalComm = confirmed.reduce((s,r)=>s+(r.commission||Math.round((r.total||0)*0.07)),0)||3312;
  const totalNights = confirmed.reduce((s,r)=>s+(r.nights||1),0);
  const KPIS = {
    gmv:totalGMV,revenue:totalComm,takeRate:7,netRevenue:Math.round(totalComm*.85)||2815,
    arpu:128,ltv:840,cac:32,ltvCac:26.3,margin:62.4,revenuePerNight:142,
    sessions:18420,organicPct:54.2,paidPct:28.6,cpc:.84,cpa:22.4,convVisitInscription:3.8,convVisitResa:1.2,bounceRate:38.4,pagesPerSession:4.7,
    searchToClick:68.4,clickToDetail:41.2,detailToResa:8.7,abandonCart:62.3,avgSessionTime:6.4,mobileShare:61.2,
    activeListings:appState.myAnnonces.filter(a=>a.status==='publiée').length||847,newHostsMonth:34,activationRate:78.4,completionRate:71.2,avgPriceNight:142,geoCountries:28,
    totalBookings:confirmed.length||312,occupancyRate:73.4,avgStayDuration:totalNights&&confirmed.length?(totalNights/confirmed.length).toFixed(1):3.2,avgBookingValue:confirmed.length?Math.round(totalGMV/confirmed.length):418,leadTime:14.6,cancelRate:2.8,noShowRate:2.1,
    avgRating:4.7,totalReviews:1847,nps:68,complaintRate:1.4,supportResponseTime:2.3,returnUserRate:34.2,
    activeHosts:hostsData.length||412,avgHostRevenue:2840,hostRetention:88.4,hostChurn:3.2,hostResponseTime:1.8,requestAcceptRate:84.6,hostCancelRate:2.8,
    paymentVolume:totalGMV,paymentSuccessRate:97.8,fraudRate:.08,chargebacks:3,avgPayoutDelay:2.4,commissionTotal:totalComm,failedPayments:12,
    suspiciousAccounts:7,fraudTransactions:2,fraudListings:1,disputeRate:.6,userReports:14,kycPending:23,
    loadTime:1.8,uptime:99.94,serverErrors:4,mobileCrash:.3,apiResponseTime:124,momGrowth:12.4,repeatBookingRate:28.7,activeCountries:18,
  };

  const upcomingResa = confirmed.slice(0,8);
  const content = document.getElementById('admin-content');
  if(!content) return;

  if(tab==='overview') content.innerHTML = buildAdminOverview(KPIS,upcomingResa,fmtEur,fmt,fmtPct,trend,kpiCard,secHeader,spark);
  else if(tab==='business') content.innerHTML = buildAdminBusiness(KPIS,fmtEur,fmt,fmtPct,trend,kpiCard,secHeader);
  else if(tab==='acquisition') content.innerHTML = buildAdminAcquisition(KPIS,fmt,fmtPct,trend,kpiCard,secHeader);
  else if(tab==='reservations') content.innerHTML = buildAdminReservations(KPIS,upcomingResa,fmtEur,fmt,fmtPct,trend,kpiCard,secHeader);
  else if(tab==='hosts') content.innerHTML = buildAdminHosts(KPIS,fmtEur,fmt,fmtPct,trend,kpiCard,secHeader);
  else if(tab==='quality') content.innerHTML = buildAdminQuality(KPIS,fmt,fmtPct,trend,kpiCard,secHeader);
  else if(tab==='payments') content.innerHTML = buildAdminPayments(KPIS,fmtEur,fmt,fmtPct,trend,kpiCard,secHeader);
  else if(tab==='risk') content.innerHTML = buildAdminRisk(KPIS,fmt,fmtPct,trend,kpiCard,secHeader);
  else if(tab==='tech') content.innerHTML = buildAdminTech(KPIS,fmt,fmtPct,trend,kpiCard,secHeader);
}

/* ===================== iCAL SYNC ===================== */

function copyIcalUrl(){
  const annId = appState.selectedAnnonceId || 'ANN-K7L8M9N0';
  const url = 'https://casago.fr/calendar/ical/'+annId+'.ics';
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>showToast('📋 URL iCal copiée !','var(--green)'));
  } else {
    // Fallback
    const el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('📋 URL iCal copiée !','var(--green)');
  }
}

function saveIcalUrl(platform, url){
  const annId = appState.selectedAnnonceId || 'ANN-K7L8M9N0';
  const ann = appState.myAnnonces.find(a=>a.id===annId);
  if(ann){
    if(!ann.icalUrls) ann.icalUrls = {};
    ann.icalUrls[platform] = url;
  }
}

function syncIcal(platform){
  const annId = appState.selectedAnnonceId || 'ANN-K7L8M9N0';
  const ann = appState.myAnnonces.find(a=>a.id===annId);
  const url = ann?.icalUrls?.[platform] || document.getElementById('ical-'+platform)?.value;

  if(!url || url.trim() === ''){
    showToast('⚠️ Collez d\'abord l\'URL iCal','var(--red)');
    return;
  }
  if(!url.includes('.ics') && !url.includes('ical') && !url.includes('calendar')){
    showToast('⚠️ URL iCal invalide — elle doit contenir .ics','var(--red)');
    return;
  }

  // Save URL
  saveIcalUrl(platform, url);

  // Simulate sync (in production: fetch the .ics file and parse VEVENT dates)
  const statusEl = document.getElementById('ical-status');
  if(statusEl){ statusEl.style.display='block'; statusEl.style.color='var(--blue)'; statusEl.textContent='⏳ Synchronisation '+platform+' en cours...'; }

  setTimeout(()=>{
    // Simulate finding 3 blocked dates from the external calendar
    const cal = getCalForAnnonce(annId);
    const today = new Date();
    const simulatedDates = [0,1,2].map(i=>{
      const d = new Date(today);
      d.setDate(d.getDate() + 30 + i);
      return d.toISOString().split('T')[0];
    });
    simulatedDates.forEach(dt=>{
      if(!cal.blocked.includes(dt)) cal.blocked.push(dt);
    });

    if(statusEl){
      statusEl.style.color='var(--green)';
      statusEl.textContent='✅ '+platform+' synchronisé — '+simulatedDates.length+' date(s) importée(s) et bloquée(s)';
    }
    showToast('✅ '+platform+' synchronisé avec succès !','var(--green)');

    // Refresh calendar grid
    setTimeout(()=>{ if(typeof renderCalGrid==='function') renderCalGrid(); }, 300);
  }, 1500);
}

function syncAllIcal(){
  const annId = appState.selectedAnnonceId || 'ANN-K7L8M9N0';
  const ann = appState.myAnnonces.find(a=>a.id===annId);
  const platforms = ['airbnb','booking','vrbo','autre'];
  const active = platforms.filter(p=> ann?.icalUrls?.[p] || document.getElementById('ical-'+p)?.value);

  if(active.length === 0){
    showToast('⚠️ Aucune URL iCal configurée','var(--red)'); return;
  }

  const statusEl = document.getElementById('ical-status');
  if(statusEl){ statusEl.style.display='block'; statusEl.style.color='var(--blue)'; statusEl.textContent='⏳ Synchronisation de '+active.length+' plateforme(s)...'; }

  let done = 0;
  active.forEach(p=>{
    setTimeout(()=>{
      syncIcal(p);
      done++;
      if(done===active.length){
        if(statusEl){ statusEl.style.color='var(--green)'; statusEl.textContent='✅ '+active.length+' plateforme(s) synchronisée(s) avec succès !'; }
      }
    }, active.indexOf(p) * 1000);
  });
}

function uploadProfilPhoto(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){
    showToast('Format non supporté (JPG, PNG, WebP)','var(--red)'); return;
  }
  if(file.size > 5*1024*1024){
    showToast('Image trop lourde (max 5 Mo)','var(--red)'); return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    if(auth.currentUser) auth.currentUser.photo = e.target.result;
    const i = auth.users.findIndex(u=>u.id===auth.currentUser.id);
    if(i>=0) auth.users[i].photo = e.target.result;
    navigate('profil');
    showToast('Photo de profil mise à jour !','var(--green)');
  };
  reader.onerror = function(){ showToast('Erreur de lecture','var(--red)'); };
  reader.readAsDataURL(file);
}

  // Destroy old map
  const mapEl = document.getElementById('ann-map');
  if(!mapEl){ showToast('Zone carte introuvable','var(--red)'); return; }
  if(annMap){ try{ annMap.off(); annMap.remove(); }catch(e){} annMap=null; annMarker=null; }
  mapEl.innerHTML='';
  // Recreate after DOM reset
  setTimeout(function(){
    try{
      annMap = L.map(mapEl,{scrollWheelZoom:false}).setView([lat,lng],14);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
        attribution:'CartoDB',subdomains:'abcd',maxZoom:19
      }).addTo(annMap);
      var icon = L.divIcon({
        html:'<div style="background:#E84B10;border:3px solid #fff;border-radius:50%;width:22px;height:22px;box-shadow:0 3px 10px rgba(0,0,0,.5);"></div>',
        iconSize:[22,22],iconAnchor:[11,11],className:''
      });
      annMarker = L.marker([lat,lng],{icon:icon,draggable:true}).addTo(annMap);
      annMarker.on('dragend',function(e){
        var p=e.target.getLatLng();
        annSet('lat',p.lat); annSet('lng',p.lng);
        var le=document.getElementById('af-lat'); if(le) le.value=p.lat.toFixed(6);
        var ge=document.getElementById('af-lng'); if(ge) ge.value=p.lng.toFixed(6);
        var ce=document.getElementById('ann-map-coords');
        if(ce) ce.textContent='Coordonnées : '+p.lat.toFixed(6)+', '+p.lng.toFixed(6);
      });
      annMap.on('click',function(e){ placeAnnMarker(e.latlng.lat,e.latlng.lng); });
      var ce=document.getElementById('ann-map-coords');
      if(ce) ce.textContent='Coordonnées : '+lat.toFixed(6)+', '+lng.toFixed(6);
      showToast('📍 Point affiché !','var(--green)');
    }catch(err){ showToast('Erreur : '+err.message,'var(--red)'); }
  },120);
}

function initAnnMap(){
  const mapEl = document.getElementById('ann-map');
  if(!mapEl){ console.warn('ann-map not found'); return; }
  // Destroy existing map instance if any
  if(annMap){ try{ annMap.remove(); }catch(e){} annMap=null; annMarker=null; }

  // Initialize map synchronously (DOM element already exists)
  annMap = L.map('ann-map', {scrollWheelZoom:false}).setView([46.6034, 1.8883], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd', maxZoom:19
  }).addTo(annMap);

  // Click on map to place marker
  annMap.on('click', function(e){
    placeAnnMarker(e.latlng.lat, e.latlng.lng);
  });

  // If coords already saved → place marker immediately
  const savedLat = parseFloat(appState.annonceData.lat);
  const savedLng = parseFloat(appState.annonceData.lng);
  if(!isNaN(savedLat) && !isNaN(savedLng)){
    annMap.setView([savedLat, savedLng], 14);
    placeAnnMarker(savedLat, savedLng);
  }
}

function placeAnnMarker(lat, lng){
  if(!annMap) return;
  const icon = L.divIcon({
    html:'<div style="background:#cc0000;border:3px solid #fff;border-radius:50%;width:18px;height:18px;box-shadow:0 2px 6px rgba(0,0,0,.4);"></div>',
    iconSize:[18,18], iconAnchor:[9,9], className:''
  });
  if(annMarker) annMap.removeLayer(annMarker);
  annMarker = L.marker([lat,lng], {icon, draggable:true}).addTo(annMap);
  annMarker.on('dragend', function(e){
    const p = e.target.getLatLng();
    updateCoordsDisplay(p.lat, p.lng);
  });
  updateCoordsDisplay(lat, lng);
  appState.annonceData.lat = lat;
  appState.annonceData.lng = lng;
}

function updateCoordsDisplay(lat, lng){
  const el = document.getElementById('ann-map-coords');
  if(el) el.textContent = 'Coordonnées : ' + lat.toFixed(6) + ', ' + lng.toFixed(6);
  appState.annonceData.lat = lat;
  appState.annonceData.lng = lng;
}

async function geocodeAddress(){
  const ad = appState.annonceData;
  const query = [ad.address, ad.city, ad.zip, ad.country].filter(Boolean).join(', ');
  if(!query.trim()){showToast('⚠️ Remplissez d\'abord votre adresse','var(--red)');return;}

  // Find button by text content (more robust)
  const btns = Array.from(document.querySelectorAll('button'));
  const btn = btns.find(b=>b.textContent.includes('Localiser'));
  if(btn){btn.textContent='⏳ Recherche...';btn.disabled=true;}

  try {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(query)+'&limit=1';
    const res = await fetch(url, {headers:{'Accept-Language':'fr','User-Agent':'Casago/1.0'}});
    const data = await res.json();
    if(data && data.length>0){
      const lat=parseFloat(data[0].lat), lng=parseFloat(data[0].lon);
      // Ensure map is ready before placing marker
      if(!annMap){
        initAnnMap();
        setTimeout(()=>{
          if(annMap){annMap.setView([lat,lng],15);placeAnnMarker(lat,lng);}
        },400);
      } else {
        annMap.setView([lat,lng],15);
        placeAnnMarker(lat,lng);
      }
      // Also update the lat/lng input fields
      const latEl=document.getElementById('af-lat');
      const lngEl=document.getElementById('af-lng');
      if(latEl){latEl.value=lat.toFixed(6);}
      if(lngEl){lngEl.value=lng.toFixed(6);}
      appState.annonceData.lat=lat;
      appState.annonceData.lng=lng;
      showToast('📍 Adresse localisée avec succès !','var(--green)');
    } else {
      showToast('Adresse introuvable — vérifiez ou cliquez sur la carte','var(--gray-700)');
    }
  } catch(e){
    showToast('Erreur réseau — vérifiez votre connexion','var(--red)');
  }
  if(btn){btn.textContent='🔍 Localiser sur la carte';btn.disabled=false;}
}

// Map init calls are handled directly in render() and annRefresh()
