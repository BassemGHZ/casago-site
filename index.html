<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casago — Trouvez votre hébergement idéal</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --blue:#003580;--blue-l:#0071c2;--yellow:#FEBB02;--yellow-d:#e6a800;
    --green:#0d9e6e;--red:#cc0000;
    --gray-50:#f8f9fa;--gray-100:#f1f3f5;--gray-200:#e9ecef;--gray-300:#dee2e6;
    --gray-400:#ced4da;--gray-500:#adb5bd;--gray-600:#6c757d;--gray-700:#495057;
    --gray-800:#343a40;--gray-900:#212529;
    --shadow-sm:0 1px 3px rgba(0,0,0,.12);--shadow-md:0 4px 12px rgba(0,0,0,.15);--shadow-lg:0 8px 24px rgba(0,0,0,.18);
    --r-sm:4px;--r-md:8px;--r-lg:12px;--r-xl:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--gray-50);color:var(--gray-900);line-height:1.5;}
  a{text-decoration:none;color:inherit;}
  button{cursor:pointer;border:none;outline:none;font-family:inherit;}
  input,select,textarea{font-family:inherit;outline:none;}

  /* ===== HEADER ===== */
  .header{background:var(--blue);color:#fff;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md);}
  .header-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px;height:60px;}
  .logo{font-size:22px;font-weight:800;cursor:pointer;flex-shrink:0;}
  .logo span{color:var(--yellow);}
  .nav{display:flex;gap:4px;margin-left:12px;}
  .nav-btn{background:transparent;color:rgba(255,255,255,.85);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid transparent;transition:all .2s;white-space:nowrap;}
  .nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff;}
  .header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
  .btn-login{background:transparent;color:#fff;padding:7px 14px;border-radius:var(--r-sm);font-size:14px;font-weight:500;border:1.5px solid rgba(255,255,255,.5);transition:all .2s;}
  .btn-login:hover{border-color:#fff;background:rgba(255,255,255,.1);}
  .btn-register{background:#fff;color:var(--blue);padding:7px 16px;border-radius:var(--r-sm);font-size:14px;font-weight:700;transition:background .2s;}
  .btn-register:hover{background:var(--gray-100);}

  /* user menu */
  .user-menu{position:relative;display:flex;align-items:center;gap:8px;}
  .user-avatar{width:34px;height:34px;border-radius:50%;background:var(--yellow);color:var(--gray-900);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid rgba(255,255,255,.4);}
  .user-name{font-size:14px;font-weight:600;color:#fff;cursor:pointer;}
  .user-dropdown{position:absolute;top:44px;right:0;background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);min-width:200px;overflow:hidden;border:1px solid var(--gray-200);z-index:200;animation:fadeDown .15s ease;}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .ud-header{padding:14px 16px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);}
  .ud-name{font-weight:700;font-size:15px;}
  .ud-email{font-size:12px;color:var(--gray-500);margin-top:2px;}
  .ud-item{padding:11px 16px;font-size:14px;color:var(--gray-700);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;}
  .ud-item:hover{background:var(--gray-50);}
  .ud-item.danger{color:var(--red);}

  /* ===== MODAL ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:var(--r-xl);width:100%;max-width:440px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:slideUp .25s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .modal-header{background:var(--blue);color:#fff;padding:24px 28px 20px;position:relative;}
  .modal-header h2{font-size:22px;font-weight:800;margin-bottom:4px;}
  .modal-header p{font-size:14px;opacity:.8;}
  .modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .modal-close:hover{background:rgba(255,255,255,.35);}
  .modal-body{padding:24px 28px 28px;}
  .modal-tabs{display:flex;margin-bottom:20px;border-radius:var(--r-md);overflow:hidden;border:1.5px solid var(--gray-200);}
  .m-tab{flex:1;padding:10px;font-size:14px;font-weight:600;background:#fff;color:var(--gray-600);border:none;cursor:pointer;transition:all .2s;}
  .m-tab.active{background:var(--blue);color:#fff;}
  .f-field{margin-bottom:14px;}
  .f-field label{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--gray-600);letter-spacing:.3px;display:block;margin-bottom:4px;}
  .f-field input{width:100%;padding:10px 13px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:15px;color:var(--gray-900);transition:border-color .2s;}
  .f-field input:focus{border-color:var(--blue-l);box-shadow:0 0 0 3px rgba(0,113,194,.1);}
  .f-field input.err{border-color:var(--red);}
  .f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:42px;}
  .pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:17px;color:var(--gray-400);}
  .str-bar{height:4px;border-radius:2px;margin-top:5px;transition:all .3s;background:var(--gray-200);}
  .str-lbl{font-size:11px;margin-top:3px;font-weight:600;color:var(--gray-400);}
  .btn-submit{width:100%;background:var(--yellow);color:var(--gray-900);padding:13px;border-radius:var(--r-md);font-size:16px;font-weight:800;transition:background .2s;margin-top:4px;}
  .btn-submit:hover{background:var(--yellow-d);}
  .btn-submit:disabled{background:var(--gray-300);color:var(--gray-500);cursor:not-allowed;}
  .m-footer{text-align:center;margin-top:14px;font-size:14px;color:var(--gray-500);}
  .m-footer a{color:var(--blue-l);font-weight:600;cursor:pointer;}
  .divider-or{display:flex;align-items:center;gap:10px;margin:14px 0;}
  .divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--gray-200);}
  .divider-or span{font-size:12px;color:var(--gray-400);font-weight:600;}
  .social-btn{width:100%;padding:10px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:14px;font-weight:600;color:var(--gray-700);background:#fff;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-bottom:8px;}
  .social-btn:hover{border-color:var(--gray-500);background:var(--gray-50);}
  .m-alert{padding:9px 13px;border-radius:var(--r-md);font-size:13px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .m-alert.err{background:#fff0f0;color:var(--red);border:1px solid #ffcccc;}
  .m-alert.ok{background:#e8f9f0;color:#0a6640;border:1px solid #a0e8c8;}
  .spinner-sm{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:var(--gray-900);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .demo-hint{margin-top:10px;padding:9px 12px;background:var(--gray-50);border-radius:var(--r-md);font-size:12px;color:var(--gray-500);text-align:center;}

  /* ===== HERO ===== */
  .hero{background:linear-gradient(135deg,#003580 0%,#0071c2 60%,#00a8e8 100%);padding:48px 20px 70px;overflow:hidden;position:relative;}
  .hero::before{content:'';position:absolute;right:-80px;top:-80px;width:400px;height:400px;background:rgba(255,255,255,.04);border-radius:50%;}
  .hero-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1;}
  .hero h1{color:#fff;font-size:32px;font-weight:800;margin-bottom:6px;}
  .hero p{color:rgba(255,255,255,.85);font-size:17px;margin-bottom:28px;}
  .search-box{background:#fff;border-radius:var(--r-lg);padding:12px;display:flex;gap:8px;align-items:stretch;box-shadow:0 8px 32px rgba(0,0,0,.25);flex-wrap:wrap;border:4px solid var(--yellow);}
  .s-field{display:flex;flex-direction:column;gap:2px;padding:6px 12px;border-radius:var(--r-sm);border:1.5px solid var(--gray-200);flex:1;min-width:140px;transition:border-color .2s;}
  .s-field:hover{border-color:var(--blue-l);}
  .s-field label{font-size:10px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.4px;}
  .s-field input{border:none;font-size:14px;font-weight:500;color:var(--gray-900);background:transparent;width:100%;padding:2px 0;}
  .s-field input:focus{outline:none;}
  .s-field input::placeholder{color:var(--gray-400);font-weight:400;}
  .btn-search{background:var(--yellow);color:var(--gray-900);font-weight:800;font-size:16px;padding:0 28px;border-radius:var(--r-md);transition:background .2s,transform .1s;white-space:nowrap;min-width:130px;}
  .btn-search:hover{background:var(--yellow-d);transform:translateY(-1px);}

  /* ===== SECTIONS ===== */
  .section{max-width:1200px;margin:0 auto;padding:40px 20px;}
  .sec-title{font-size:22px;font-weight:800;color:var(--gray-900);margin-bottom:6px;}
  .sec-sub{font-size:15px;color:var(--gray-600);margin-bottom:24px;}

  /* destinations */
  .dest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
  .dest-card{border-radius:var(--r-lg);overflow:hidden;cursor:pointer;position:relative;aspect-ratio:4/3;transition:transform .2s,box-shadow .2s;}
  .dest-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
  .dest-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;}
  .dest-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,0) 60%);}
  .dest-info{position:absolute;bottom:0;left:0;right:0;padding:12px 10px;color:#fff;}
  .dest-info h3{font-size:15px;font-weight:700;margin-bottom:2px;}
  .dest-info p{font-size:12px;opacity:.85;}

  /* hotel cards */
  .hotel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
  .hotel-card{background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid var(--gray-200);}
  .hotel-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
  .hc-img{width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:52px;}
  .hc-body{padding:14px 16px 16px;}
  .hc-name{font-size:16px;font-weight:700;margin-bottom:4px;}
  .hc-loc{font-size:13px;color:var(--blue-l);margin-bottom:8px;}
  .hc-rating{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
  .r-badge{background:var(--blue);color:#fff;font-weight:800;font-size:13px;padding:4px 8px;border-radius:6px 6px 6px 0;}
  .r-label{font-size:13px;font-weight:600;color:var(--gray-700);}
  .r-count{font-size:12px;color:var(--gray-500);}
  .hc-price{font-size:20px;font-weight:800;}
  .hc-free{font-size:11.5px;color:var(--green);font-weight:600;margin-top:3px;}

  /* deals */
  .deals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
  .deal-card{background:#fff;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--gray-200);cursor:pointer;display:flex;transition:box-shadow .2s,transform .2s;}
  .deal-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
  .deal-img{width:110px;flex-shrink:0;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:40px;}
  .deal-body{padding:14px;flex:1;}
  .deal-badge{background:#d40000;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:6px;}
  .deal-name{font-size:15px;font-weight:700;margin-bottom:3px;}
  .deal-loc{font-size:12px;color:var(--gray-500);margin-bottom:8px;}
  .deal-prices{display:flex;align-items:center;gap:8px;}
  .deal-old{font-size:13px;color:var(--gray-500);text-decoration:line-through;}
  .deal-new{font-size:18px;font-weight:800;}

  /* ===== RESULTS PAGE ===== */
  .results-layout{max-width:1200px;margin:0 auto;padding:24px 20px;display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start;}
  .filters-panel{background:#fff;border-radius:var(--r-lg);border:1px solid var(--gray-200);padding:20px;position:sticky;top:76px;}
  .f-section{margin-bottom:22px;}
  .f-section:last-child{margin-bottom:0;}
  .f-title{font-size:13px;font-weight:800;color:var(--gray-800);margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px;}
  .f-opt{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;}
  .f-opt label{font-size:14px;color:var(--gray-700);cursor:pointer;flex:1;}
  .f-opt input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;}
  .price-vals{display:flex;justify-content:space-between;font-size:13px;color:var(--gray-600);margin-bottom:5px;}
  .price-vals strong{color:var(--gray-800);}
  input[type=range]{width:100%;accent-color:var(--blue);}
  .results-list{display:flex;flex-direction:column;gap:16px;}
  .results-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .results-count{font-size:20px;font-weight:700;}
  .sort-sel{padding:7px 12px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:14px;color:var(--gray-700);background:#fff;cursor:pointer;}
  .result-card{background:#fff;border-radius:var(--r-lg);border:1px solid var(--gray-200);overflow:hidden;display:flex;cursor:pointer;transition:box-shadow .2s,transform .2s;}
  .result-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
  .rc-img{width:230px;flex-shrink:0;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:56px;}
  .rc-body{padding:18px 20px;flex:1;display:flex;gap:16px;}
  .rc-info{flex:1;}
  .rc-name{font-size:18px;font-weight:700;color:var(--blue-l);margin-bottom:4px;}
  .rc-name:hover{text-decoration:underline;}
  .rc-type{font-size:12px;background:var(--gray-100);color:var(--gray-600);padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:8px;}
  .rc-loc{font-size:13px;color:var(--gray-500);margin-bottom:8px;}
  .rc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .rc-tag{font-size:12px;background:#e8f4ff;color:#0056b3;padding:3px 9px;border-radius:20px;font-weight:500;}
  .rc-desc{font-size:13px;color:var(--gray-600);line-height:1.5;}
  .rc-price{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;min-width:145px;padding:4px 0;}
  .rc-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .badge-green{font-size:12px;color:var(--green);font-weight:600;}
  .rc-amount{font-size:22px;font-weight:800;}
  .rc-excl{font-size:11px;color:var(--gray-500);}
  .btn-choose{background:var(--blue-l);color:#fff;padding:9px 16px;border-radius:var(--r-md);font-size:14px;font-weight:700;transition:background .2s;margin-top:6px;}
  .btn-choose:hover{background:var(--blue);}
  .pagination{display:flex;justify-content:center;gap:6px;margin-top:24px;}
  .pg-btn{width:36px;height:36px;border-radius:var(--r-md);background:#fff;border:1.5px solid var(--gray-300);font-size:14px;font-weight:600;color:var(--gray-700);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .pg-btn:hover{border-color:var(--blue-l);color:var(--blue-l);}
  .pg-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .no-results{text-align:center;padding:60px 20px;}
  .no-results h3{font-size:20px;font-weight:700;color:var(--gray-700);margin-bottom:8px;}
  .no-results p{color:var(--gray-500);}

  /* ===== DETAIL PAGE ===== */
  .detail-wrap{max-width:1200px;margin:0 auto;padding:24px 20px;}
  .det-name{font-size:26px;font-weight:800;margin-bottom:6px;}
  .det-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .stars-txt{color:var(--yellow-d);font-size:16px;}
  .det-loc{font-size:14px;color:var(--blue-l);}
  .gallery{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:200px 200px;gap:6px;border-radius:var(--r-lg);overflow:hidden;margin-bottom:24px;}
  .g-main{grid-row:span 2;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:90px;}
  .g-thumb{background:var(--gray-50);display:flex;align-items:center;justify-content:center;font-size:40px;}
  .det-body{display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start;}
  .det-section{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;margin-bottom:20px;}
  .det-sec-title{font-size:18px;font-weight:700;margin-bottom:14px;}
  .amen-grid-det{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .amen-item-det{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--gray-700);}
  .bk-box{background:#fff;border:2px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;position:sticky;top:76px;}
  .bk-price{font-size:26px;font-weight:800;margin-bottom:16px;}
  .bk-price span{font-size:14px;font-weight:400;color:var(--gray-500);}
  .bk-field{margin-bottom:12px;}
  .bk-field label{font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:4px;}
  .bk-field input,.bk-field select{width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:var(--r-md);font-size:14px;color:var(--gray-800);}
  .bk-field input:focus,.bk-field select:focus{border-color:var(--blue-l);}
  .bk-div{border:none;border-top:1px solid var(--gray-200);margin:12px 0;}
  .bk-row{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;}
  .bk-row.total{font-weight:800;font-size:16px;padding-top:7px;border-top:2px solid var(--gray-200);margin-top:4px;}
  .btn-reserve{width:100%;background:var(--blue-l);color:#fff;padding:14px;border-radius:var(--r-md);font-size:16px;font-weight:800;transition:background .2s;margin-top:12px;}
  .btn-reserve:hover{background:var(--blue);}
  .bk-guarantees{margin-top:10px;display:flex;flex-direction:column;gap:5px;}
  .bk-g{font-size:13px;color:var(--green);font-weight:600;}
  .reviews{display:flex;flex-direction:column;gap:14px;}
  .rev-item{padding:12px 0;border-bottom:1px solid var(--gray-200);}
  .rev-item:last-child{border:none;}
  .rev-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .rev-av{width:36px;height:36px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
  .rev-name{font-weight:700;font-size:14px;}
  .rev-date{font-size:12px;color:var(--gray-500);}
  .rev-score{background:var(--blue);color:#fff;font-weight:800;font-size:13px;padding:3px 8px;border-radius:4px;}
  .rev-text{font-size:14px;color:var(--gray-600);line-height:1.6;}

  /* ===== CONFIRM PAGE ===== */
  .confirm-wrap{max-width:640px;margin:50px auto;padding:0 20px;}
  .confirm-card{background:#fff;border-radius:var(--r-xl);border:1px solid var(--gray-200);overflow:hidden;box-shadow:var(--shadow-md);}
  .confirm-hdr{background:var(--blue);color:#fff;padding:28px 28px 24px;}
  .confirm-icon{width:56px;height:56px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px;}
  .confirm-hdr h2{font-size:22px;font-weight:800;margin-bottom:4px;}
  .confirm-hdr p{opacity:.85;font-size:14px;}
  .confirm-body{padding:28px;}
  .sum-box{background:var(--gray-50);border-radius:var(--r-md);padding:16px;margin-bottom:22px;border:1px solid var(--gray-200);}

<!-- ========== BANDEAU 0% COMMISSION ========== -->
<div id="launch-banner" style="background:#1E2D4E;color:#fff;padding:9px 20px;text-align:center;position:relative;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;">
  <span style="font-size:13px;font-weight:500;">Réservez et publiez vos annonces</span>
  <span style="background:#E84B10;color:#fff;font-size:12px;font-weight:800;padding:4px 14px;border-radius:20px;">0% de commission</span>
  <span style="font-size:13px;font-weight:500;">Paiement sur place · Aucun frais caché</span>
  <button onclick="document.getElementById('launch-banner').style.display='none'" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px;">✕</button>
</div>

<div id="app"></div>
<div id="modal-root"></div>

<script>
/* ===================== DATA ===================== */
/* ===================== DEVICE DETECTION ===================== */
// ── Device detection ─────────────────────────────────────────────────────────
const DEVICE = {
  get mobile()  { return window.innerWidth <= 768; },
  get tablet()  { return window.innerWidth > 768 && window.innerWidth <= 1024; },
  get desktop() { return window.innerWidth > 1024; },
  get touch()   { return ('ontouchstart' in window) || navigator.maxTouchPoints > 0; },
  get type()    {
    const ua = navigator.userAgent.toLowerCase();
    if(/iphone|android.*mobile|windows phone/.test(ua)) return 'phone';
    if(/ipad|android(?!.*mobile)|tablet/.test(ua)) return 'tablet';
    return window.innerWidth <= 768 ? 'phone' : window.innerWidth <= 1024 ? 'tablet' : 'desktop';
  }
};
const isMobile = () => DEVICE.mobile;
const isTablet = () => DEVICE.tablet;

// Show device banner on first load
function showDeviceBanner(){
  const existing = document.getElementById('device-banner');
  if(existing) return;
  const type = DEVICE.type;
  if(type === 'desktop') return; // no banner needed on desktop
  const banner = document.createElement('div');
  banner.id = 'device-banner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:'+(type==='phone'?'#003580':'#0a5c3e')+';color:#fff;padding:8px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:between;gap:10px;';
  banner.innerHTML = '<span style="flex:1;">'+(type==='phone'?'📱 Version mobile activée':'📲 Version tablette activée')+' — Interface optimisée</span>'
    ;
  document.body.prepend(banner);
  setTimeout(()=>{ const b=document.getElementById('device-banner'); if(b) b.remove(); }, 4000);
}

// Re-render on orientation change / resize
window.addEventListener('resize', () => {
  const delta = Math.abs(window.innerWidth - (window._lastWidth||0));
  if(delta > 50){
    window._lastWidth = window.innerWidth;
    render();
  }
});
window._lastWidth = window.innerWidth;
// Show device banner when JS loads
setTimeout(showDeviceBanner, 500);

/* ===================== COMMISSION ===================== */
const COMMISSION_RATE = 0.07; // 7% prélevée par Casago sur chaque réservation

// Calculate commission breakdown
function calcCommission(grossTotal){
  const commission = Math.round(grossTotal * COMMISSION_RATE);
  const netToHost  = grossTotal - commission;
  return { gross: grossTotal, commission, netToHost, rate: COMMISSION_RATE };

// Helper: get or create calendar for an annonce
function getCalForAnnonce(annonceId){
  if(!calendarData[annonceId]){
    calendarData[annonceId] = {blocked:[], minNights:1, maxNights:30, priceOverrides:{}};
  }
  return calendarData[annonceId];
}

// Check if a date is blocked for a given hotel (by matching against myAnnonces)
function isDateBlockedForHotel(hId, dateStr){
  // Find annonce matching this hotel
  const ann = appState.myAnnonces.find(a=>a.hotelId===hId);
  if(!ann) return false;
  const cal = calendarData[ann.id];
  return cal ? cal.blocked.includes(dateStr) : false;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(buildHeader());
  const pg = appState.page;
  if(pg==='home') app.appendChild(buildHome());
  else if(pg==='results') app.appendChild(buildResults());
  else if(pg==='detail') app.appendChild(buildDetail());
  else if(pg==='confirm') app.appendChild(buildConfirm());
  else if(pg==='annonce') app.appendChild(buildAnnonce());
  else if(pg==='reservations') app.appendChild(buildReservations());
  else if(pg==='favoris') app.appendChild(buildFavoris());
  else if(pg==='mesannonces') app.appendChild(buildMesAnnonces());
  else if(pg==='annonce-detail') app.appendChild(buildAnnonceDetail());
  else if(pg==='profil') app.appendChild(buildProfil());
  else if(pg==='excursions') app.appendChild(buildExcursions());
  else if(pg==='excursion-detail') app.appendChild(buildExcursionDetail());
  else if(pg==='excursion-form') app.appendChild(buildExcursionForm());
  else if(pg==='payment') app.appendChild(buildPayment());
  else if(pg==='host-profile') app.appendChild(buildHostProfile());
  else if(pg==='messages') app.appendChild(buildMessages());
  else if(pg==='conversation') app.appendChild(buildConversation());
  else if(pg==='booking-requests') app.appendChild(buildBookingRequests());
  else if(pg==='host-calendar') app.appendChild(buildHostCalendar());
  else if(pg==='admin') app.appendChild(buildAdminDashboard());
  else if(pg==='about')     app.appendChild(buildAboutPage());
  else if(pg==='fidelite')  app.appendChild(buildFidelitePage());
  app.appendChild(buildFooter());
  // Init maps after DOM is ready
  if(pg==='detail'){
    const h = hotels.find(x=>x.id===appState.selectedHotelId);
    if(h) setTimeout(()=>initHotelMap(h.id), 200);
    if(h) setTimeout(()=>initBlockedDatesPicker(h.id), 150);
  }
  if(pg==='annonce' && appState.annoncePage===1) setTimeout(initAnnMap, 200);
}

function navigate(page, extra){
  if(extra) Object.assign(appState, extra);
  if(page !== 'annonce') appState.annoncePage = 0;
  appState.page = page;
  window.scrollTo(0,0);
  render();
}

/* ===================== MODAL ===================== */
let modalMode = 'login';
function openModal(mode){modalMode=mode;renderModal();}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function renderModal(){
  const root = document.getElementById('modal-root');
  root.innerHTML='';
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.onclick=(e)=>{if(e.target===overlay)closeModal();};
  const isLogin = modalMode==='login';
  const modal = document.createElement('div');
  modal.className='modal';
  modal.innerHTML=`<div class="modal-header">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>${isLogin?'👋 Bon retour !':'🎉 Créer un compte'}</h2>
    <p>${isLogin?'Connectez-vous pour accéder à vos réservations':'Rejoignez des millions de voyageurs'}</p>
  </div>
  <div class="modal-body">
    <div class="modal-tabs">
      <button class="m-tab ${isLogin?'active':''}" onclick="modalMode='login';renderModal()">Se connecter</button>
      <button class="m-tab ${!isLogin?'active':''}" onclick="modalMode='register';renderModal()">S'inscrire</button>
    </div>
    <div id="modal-alert"></div>
    ${isLogin ? buildLoginForm() : buildRegisterForm()}
  </div>`;
  overlay.appendChild(modal);
  root.appendChild(overlay);
  if(isLogin){
    document.getElementById('lf-email').onkeypress=e=>{if(e.key==='Enter')handleLogin();};
    document.getElementById('lf-password').onkeypress=e=>{if(e.key==='Enter')handleLogin();};
  } else {
    document.getElementById('rf-password').oninput=updatePwStrength;
  }
}

function togglePw(id, btn){ const i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; btn.textContent=i.type==='text'?'🙈':'👁️'; }

function updatePwStrength(){
  const pw=document.getElementById('rf-password').value;
  const bar=document.getElementById('str-bar'); const lbl=document.getElementById('str-lbl');
  if(!pw){bar.style.cssText='';lbl.textContent='Entrez un mot de passe';lbl.style.color='var(--gray-400)';return;}
  let s=0;
  if(pw.length>=8)s++; if(pw.length>=12)s++; if(/[A-Z]/.test(pw))s++; if(/[0-9]/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw))s++;
  const lvls=[['25%','#e74c3c','Très faible'],['40%','#e67e22','Faible'],['60%','#f1c40f','Moyen'],['80%','#2ecc71','Fort'],['100%','#27ae60','Très fort']];
  const l=lvls[Math.min(s,4)];
  bar.style.cssText=`height:4px;border-radius:2px;background:${l[1]};width:${l[0]};transition:all .3s;`;
  lbl.textContent=l[2]; lbl.style.color=l[1];
}

function showModalAlert(msg, type='err'){
  const el=document.getElementById('modal-alert');
  if(!el)return;
  el.innerHTML=`<div class="m-alert ${type}">${type==='err'?'⚠️':'✅'} ${msg}</div>`;
}

function handleLogin(){
  const email=document.getElementById('lf-email')?.value?.trim();
  const pw=document.getElementById('lf-password')?.value;
  if(!email||!pw){showModalAlert('Veuillez remplir tous les champs.');return;}
  const btn=document.querySelector('.btn-submit');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner-sm"></span>';}
  setTimeout(()=>{
    const user=auth.users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.password===pw);
    if(user){auth.currentUser=user;closeModal();renderAuthArea();showToast(`Bienvenue, ${user.firstName} ! 🎉`,'var(--green)');}
    else{if(btn){btn.disabled=false;btn.textContent='Se connecter';}showModalAlert('E-mail ou mot de passe incorrect.');}
  },900);
}

/* ── Email verification state ── */
const emailVerification = {
  pending: null,  // {email, code, firstName, lastName, password, expiresAt}
};

function generateCode(){
  return String(Math.floor(100000 + Math.random() * 900000));
}

function handleRegister(){
  const first   = document.getElementById('rf-first')?.value?.trim();
  const last    = document.getElementById('rf-last')?.value?.trim();
  const email   = document.getElementById('rf-email')?.value?.trim();
  const pw      = document.getElementById('rf-password')?.value;
  const confirm = document.getElementById('rf-confirm')?.value;
  const terms   = document.getElementById('rf-terms')?.checked;

  if(!first||!last||!email||!pw||!confirm){showModalAlert('Remplissez tous les champs.');return;}
  if(!/\S+@\S+\.\S+/.test(email)){showModalAlert('E-mail invalide.');return;}
  if(pw.length<8){showModalAlert('Mot de passe trop court (min. 8 caractères).');return;}
  if(pw!==confirm){showModalAlert('Les mots de passe ne correspondent pas.');return;}
  if(!terms){showModalAlert("Acceptez les conditions d'utilisation.");return;}
  if(auth.users.find(u=>u.email.toLowerCase()===email.toLowerCase())){
    showModalAlert('Un compte existe déjà avec cet e-mail.');return;
  }

  const btn = document.querySelector('.btn-submit');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner-sm"></span> Envoi en cours…';}

  // Generate 6-digit code and store pending registration
  const code = generateCode();
  emailVerification.pending = {
    firstName: first, lastName: last, email, password: pw,
    code, expiresAt: Date.now() + 15 * 60 * 1000  // 15 min
  };

  // Simulate email send (1s delay)
  setTimeout(()=>{
    if(btn){btn.disabled=false;btn.textContent='Créer mon compte gratuitement';}
    // Show verification screen
    showEmailVerificationScreen(email, code);
  }, 1200);
}

    </div>`;

function otpInput(el, idx){
  // Keep only digits
  el.value = el.value.replace(/\D/g,'').slice(-1);
  el.style.borderColor = el.value ? 'var(--blue)' : 'var(--gray-300)';
  // Move to next field
  if(el.value && idx < 5) document.getElementById('otp-'+(idx+1))?.focus();
  // Auto-verify when all filled
  const full = [0,1,2,3,4,5].map(i=>document.getElementById('otp-'+i)?.value||'').join('');
  if(full.length === 6) setTimeout(verifyEmailCode, 300);
}

function otpBack(e, idx){
  if(e.key === 'Backspace' && !e.target.value && idx > 0){
    document.getElementById('otp-'+(idx-1))?.focus();
  }
}

function otpPaste(e){
  e.preventDefault();
  const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
  paste.split('').forEach((c,i)=>{
    const el = document.getElementById('otp-'+i);
    if(el){ el.value=c; el.style.borderColor='var(--blue)'; }
  });
  if(paste.length===6) setTimeout(verifyEmailCode, 300);
}

function verifyEmailCode(){
  const entered = [0,1,2,3,4,5].map(i=>document.getElementById('otp-'+i)?.value||'').join('');
  const errEl   = document.getElementById('otp-error');
  const btnEl   = document.getElementById('btn-verify');
  const pending = emailVerification.pending;

  if(entered.length < 6){
    if(errEl){errEl.textContent='Entrez les 6 chiffres du code.';errEl.style.display='block';}
    return;
  }
  if(!pending){
    if(errEl){errEl.textContent='Session expirée. Recommencez.';errEl.style.display='block';}
    return;
  }
  if(Date.now() > pending.expiresAt){
    if(errEl){errEl.textContent='Code expiré (15 min). Cliquez sur Renvoyer.';errEl.style.display='block';}
    return;
  }

  if(btnEl){btnEl.disabled=true;btnEl.innerHTML='<span class="spinner-sm"></span> Vérification…';}

  setTimeout(()=>{
    if(entered === pending.code){
      // ✅ Code correct → create account
      const newUser = {
        id: Date.now(),
        role: 'user',
        firstName: pending.firstName,
        lastName:  pending.lastName,
        email:     pending.email,
        password:  pending.password,
        emailVerified: true,
        createdAt: new Date().toISOString().split('T')[0],
        bankData: {preferredMethod:'virement'}
      };
      auth.users.push(newUser);
      auth.currentUser = newUser;
      emailVerification.pending = null;
      closeModal();
      renderAuthArea();
      showToast(`Compte vérifié ! Bienvenue, ${newUser.firstName} ✅`,'var(--green)');
    } else {
      // ❌ Wrong code
      if(btnEl){btnEl.disabled=false;btnEl.textContent='✅ Vérifier et créer mon compte';}
      if(errEl){errEl.textContent='Code incorrect. Vérifiez votre e-mail.';errEl.style.display='block';}
      // Shake animation on inputs
      [0,1,2,3,4,5].forEach(i=>{
        const el=document.getElementById('otp-'+i);
        if(el){el.style.borderColor='var(--red)';el.value='';}
      });
      document.getElementById('otp-0')?.focus();
    }
  }, 800);
}

function resendVerificationCode(){
  if(!emailVerification.pending) return;
  const newCode = generateCode();
  emailVerification.pending.code = newCode;
  emailVerification.pending.expiresAt = Date.now() + 15 * 60 * 1000;
  // Update the displayed code in the demo panel
  const demoCode = document.querySelector('[style*="letter-spacing:8px"]');
  if(demoCode) demoCode.textContent = newCode;
  // Clear inputs
  [0,1,2,3,4,5].forEach(i=>{
    const el=document.getElementById('otp-'+i);
    if(el){el.value='';el.style.borderColor='var(--gray-300)';}
  });
  document.getElementById('otp-0')?.focus();
  const msg = document.getElementById('resend-msg');
  if(msg){msg.style.display='block';setTimeout(()=>msg.style.display='none',3000);}
}

/* ===================== TOAST ===================== */
function showToast(msg, bg='var(--green)'){
  const old=document.getElementById('toast'); if(old)old.remove();
  const t=document.createElement('div');
  t.id='toast'; t.className='toast'; t.style.background=bg; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},3000);
}

function validateSearchDates(){
  const inEl  = document.getElementById('s-in');
  const outEl = document.getElementById('s-out');
  if(!inEl || !outEl) return;
  const ci = inEl.value;
  const co = outEl.value;
  const today = new Date().toISOString().split('T')[0];
  // Checkin cannot be in the past
  if(ci && ci < today){ inEl.value = today; }
  // Checkout must be after checkin
  if(ci && co && co <= ci){
    const minCo = new Date(ci);
    minCo.setDate(minCo.getDate()+1);
    outEl.value = minCo.toISOString().split('T')[0];
    showToast('📅 Date de départ ajustée','var(--blue)');
  }
  // Set min on checkout
  if(ci && outEl) outEl.min = new Date(new Date(ci).getTime()+86400000).toISOString().split('T')[0];
}

function getFiltered(){

    if(h.price>appState.filters.maxPrice) return false;
    if(h.rating<appState.filters.minRating) return false;
    if(appState.filters.types.length>0 && !appState.filters.types.includes(h.type)) return false;
    return true;
  });
  if(appState.sort==='price_asc') list.sort((a,b)=>a.price-b.price);
  else if(appState.sort==='rating') list.sort((a,b)=>b.rating-a.rating);
  return list;
}

function calcNights(){
  const ci=document.getElementById('bk-ci')?.value||appState.checkIn||appState.searchCheckIn;
  const co=document.getElementById('bk-co')?.value||appState.checkOut||appState.searchCheckOut;
  if(!ci||!co)return 0;
  return Math.max(0,Math.round((new Date(co)-new Date(ci))/86400000));
}

function calcBkHTML(h){
  const n=calcNights();
  const rooms=parseInt(document.getElementById('bk-rooms')?.value||appState.rooms||1);
  if(n<=0)return `<div style="font-size:13px;color:var(--gray-500);text-align:center;padding:8px 0;">Sélectionnez vos dates pour voir le total</div>`;
  const sub=h.price*n*rooms, taxes=Math.round(sub*.1), total=sub+taxes;
  return `<div class="bk-row"><span>${h.price}€ × ${n} nuit${n>1?'s':''} × ${rooms} ch.</span><span>${sub}€</span></div>
    <div class="bk-row"><span>Taxes et frais</span><span>${taxes}€</span></div>
    <div class="bk-row total"><span>Total</span><span>${total}€</span></div>`;
}

function updateBk(){
  const ciEl = document.getElementById('bk-ci');
  const coEl = document.getElementById('bk-co');
  const ci = ciEl?.value;
  const co = coEl?.value;

  // Enforce: checkout must be strictly after checkin
  if(ci){
    // Set min date for checkout = checkin + 1 day
    const minCo = new Date(ci);
    minCo.setDate(minCo.getDate()+1);
    const minCoStr = minCo.toISOString().split('T')[0];
    if(coEl) coEl.min = minCoStr;
    // If checkout <= checkin, auto-correct to checkin + 1
    if(co && co <= ci){
      const corrected = minCoStr;
      if(coEl) coEl.value = corrected;
      appState.checkOut = corrected;
      showToast('📅 Date de départ ajustée','var(--blue)');
    } else {
      appState.checkOut = co;
    }
  }

  // Set min date for checkin = today
  const todayStr = new Date().toISOString().split('T')[0];
  if(ciEl) ciEl.min = todayStr;

  // If checkin is in the past, reset it
  if(ci && ci < todayStr){
    if(ciEl) ciEl.value = todayStr;
    appState.checkIn = todayStr;
  } else {
    appState.checkIn = ci;
  }

  appState.rooms = parseInt(document.getElementById('bk-rooms')?.value||1);
  const h = hotels.find(x=>x.id===appState.selectedHotelId);
  if(h){
    document.getElementById('bk-calc').innerHTML = calcBkHTML(h);
    // Check availability
    const availEl = document.getElementById('bk-avail-warn');
    if(availEl && appState.checkIn && appState.checkOut){
      const ok = isDateRangeAvailable(h.id, appState.checkIn, appState.checkOut);
      availEl.style.display = ok ? 'none' : 'flex';
    }
  }
}

function goToPayment(hId, total){
  const name=document.getElementById('cf-name')?.value?.trim();
  const email=document.getElementById('cf-email')?.value?.trim();
  if(!name){showToast('⚠️ Remplissez votre prénom et nom.','var(--red)');document.getElementById('cf-name')?.focus();return;}
  if(!email){showToast('⚠️ Remplissez votre adresse e-mail.','var(--red)');document.getElementById('cf-email')?.focus();return;}
  if(!/\S+@\S+\.\S+/.test(email)){showToast('⚠️ Adresse e-mail invalide.','var(--red)');return;}
  const h=hotels.find(x=>x.id===hId);
  const ci=appState.checkIn||document.getElementById('cf-checkin')?.value||'';
  const co=appState.checkOut||document.getElementById('cf-checkout')?.value||'';
  const nights=ci&&co?Math.max(1,Math.round((new Date(co)-new Date(ci))/86400000)):1;
  const safeTotal=total>0?total:(h?h.price*nights*(appState.rooms||1):0);
  appState.pendingBooking={
    type:'hotel', hotelId:hId, name, email,
    phone:document.getElementById('cf-phone')?.value||'',
    notes:document.getElementById('cf-notes')?.value||'',
    total:safeTotal, nights, checkIn:ci, checkOut:co, rooms:appState.rooms||1
  };
  navigate('payment');
}

function isDateRangeAvailable(hId, checkIn, checkOut){
  if(!checkIn || !checkOut) return true;
  // Find annonce for this hotel
  const ann = appState.myAnnonces.find(a=>
    a.name && hotels.find(h=>h.id===hId && (h.name===a.name || a.city===h.city))
  );
  if(!ann) return true; // No managed calendar = always available
  const cal = calendarData[ann.id];
  if(!cal || !cal.blocked.length) return true;
  // Check each day in range
  const start = new Date(checkIn);
  const end   = new Date(checkOut);
  for(let d=new Date(start); d<end; d.setDate(d.getDate()+1)){
    const ds = d.toISOString().split('T')[0];
    if(cal.blocked.includes(ds)) return false;
  }
  return true;
}

function goConfirm(hId){
  appState.selectedHotelId=hId;
  appState.checkIn=document.getElementById('bk-ci')?.value||appState.checkIn;
  appState.checkOut=document.getElementById('bk-co')?.value||appState.checkOut;
  appState.rooms=parseInt(document.getElementById('bk-rooms')?.value||1);

  if(appState.checkIn && appState.checkOut){
    const nights = Math.round((new Date(appState.checkOut)-new Date(appState.checkIn))/86400000);

    // Get minNights: from hotel data directly (most reliable)
    const h = hotels.find(x=>x.id===hId);
    const minN = h?.minNights || 1;
    const maxN = h?.maxNights || 365;

    // ── Validate minimum nights ──
    if(nights < minN){
      showToast('⚠️ Séjour minimum : '+minN+' nuit'+(minN>1?'s':'')+' pour ce logement.','var(--red)');
      const bk = document.querySelector('.bk-box');
      if(bk){ bk.style.boxShadow='0 0 0 3px var(--red)'; setTimeout(()=>bk.style.boxShadow='',2500); }
      return;
    }

    // ── Validate maximum nights ──
    if(maxN && nights > maxN){
      showToast('⚠️ Séjour maximum : '+maxN+' nuits pour ce logement.','var(--red)');
      return;
    }

    // ── Validate availability ──
    if(!isDateRangeAvailable(hId, appState.checkIn, appState.checkOut)){
      showToast('⛔ Dates indisponibles. Choisissez d\'autres dates.','var(--red)');
      return;
    }
  } else {
    // No dates selected
    showToast('⚠️ Sélectionnez vos dates d\'arrivée et de départ.','var(--red)');
    return;
  }

  navigate('confirm');
}

// Track selected payment mode
let selectedPayMode = 'later';

function selectPayMode(mode){
  selectedPayMode = mode;
  // Update card borders
  const nowEl   = document.getElementById('pay-mode-now');
  const laterEl = document.getElementById('pay-mode-later');
  if(nowEl){
    nowEl.style.borderColor = mode==='now' ? 'var(--blue)'  : 'var(--gray-300)';
    nowEl.style.background  = mode==='now' ? 'rgba(0,53,128,.05)' : '#fff';
  }
  if(laterEl){
    laterEl.style.borderColor = mode==='later' ? 'var(--green)' : 'var(--gray-300)';
    laterEl.style.background  = mode==='later' ? 'rgba(13,158,110,.05)' : '#fff';
  }
  // Sync radio checked state (in case called programmatically)
  const radioNow   = document.getElementById('radio-now');
  const radioLater = document.getElementById('radio-later');
  if(radioNow)   radioNow.checked   = mode==='now';
  if(radioLater) radioLater.checked = mode==='later';
  // Update main button
  const btn = document.getElementById('main-confirm-btn');
  if(btn){
    if(mode==='now'){
      btn.textContent = '💳 Procéder au paiement →';
      btn.style.background = 'var(--yellow)';
      btn.style.color      = 'var(--gray-900)';
    } else {
      btn.textContent = '🏨 Confirmer — Payer sur place';
      btn.style.background = 'var(--green)';
      btn.style.color      = '#fff';
    }
  }
}

function handleConfirmChoice(hId, total){
  // Version lancement : paiement sur place uniquement
  payOnSite(hId, total);
}

function payOnSite(hId, total){
  const name = document.getElementById('cf-name')?.value?.trim();
  const email = document.getElementById('cf-email')?.value?.trim();
  if(!name){showToast('⚠️ Remplissez votre prénom et nom.','var(--red)');document.getElementById('cf-name')?.focus();return;}
  if(!email){showToast('⚠️ Remplissez votre adresse e-mail.','var(--red)');document.getElementById('cf-email')?.focus();return;}
  if(!/\S+@\S+\.\S+/.test(email)){showToast('⚠️ Adresse e-mail invalide.','var(--red)');return;}
  const h = hotels.find(x=>x.id===hId);
  const nights = Math.max(1,Math.round((new Date(appState.checkOut)-new Date(appState.checkIn))/86400000))||1;
  const ref = 'SF-'+Math.random().toString(36).substr(2,8).toUpperCase();
  const newResa = {
    id:ref, hotelId:hId, name, email, total,
    checkIn:appState.checkIn||'', checkOut:appState.checkOut||'',
    rooms:appState.rooms||1, nights, status:'confirmée',
    paymentMethod:'Paiement sur place',
    createdAt:new Date().toISOString().split('T')[0]
  };
  appState.reservations.unshift(newResa);
  appState.confirmedBooking = {
    hotel:h, name, email, total,
    checkIn:appState.checkIn, checkOut:appState.checkOut,
    rooms:appState.rooms, ref,
    paymentMethod:'Paiement sur place'
  };
  navigate('confirm');
}

function submitBooking(hId,total){
  const name=document.getElementById('cf-name')?.value;
  const email=document.getElementById('cf-email')?.value;
  if(!name||!email){showToast('⚠️ Remplissez votre nom et email.','var(--red)');return;}
  const h=hotels.find(x=>x.id===hId);
  const nights=Math.max(1,Math.round((new Date(appState.checkOut)-new Date(appState.checkIn))/86400000))||1;
  const ref='SF-'+Math.random().toString(36).substr(2,8).toUpperCase();
  const comm=calcCommission(total);
  const newResa={
    id:ref, hotelId:hId, name, email, total,
    commission:comm.commission, netToHost:comm.netToHost,
    checkIn:appState.checkIn||'', checkOut:appState.checkOut||'',
    rooms:appState.rooms||1, nights, status:'confirmée',
    createdAt:new Date().toISOString().split('T')[0]
  };
  appState.reservations.unshift(newResa);
  appState.confirmedBooking={hotel:h,name,email,total,checkIn:appState.checkIn,checkOut:appState.checkOut,rooms:appState.rooms,ref};
  navigate('confirm');
}

/* ===================== ANNONCE ===================== */
const ANN_STEPS=['Type & infos','Localisation','Photos','Tarifs','Récapitulatif'];

function buildAnnonce(){
  if(appState.annoncePublished) return buildAnnonceSuccess();
  const d=document.createElement('div');
  const cur=appState.annoncePage;
  const ad=appState.annonceData;
  d.innerHTML=`<div class="annonce-wrap">
    <h1 class="ann-title">📋 Déposer une annonce</h1>
    <p class="ann-sub">Publiez votre logement en quelques minutes et touchez des milliers de voyageurs.</p>
    <div class="stepper">${ANN_STEPS.map((s,i)=>`
      <div class="st-step">
        <div class="st-circle ${i<cur?'done':i===cur?'active':''}">${i<cur?'✓':i+1}</div>
        <span class="st-label ${i<cur?'done':i===cur?'active':''}">${s}</span>
      </div>${i<ANN_STEPS.length-1?`<div class="st-line ${i<cur?'done':''}"></div>`:''}`).join('')}
    </div>
    <div id="ann-step">${annStep(cur,ad)}</div>
  </div>`;
  return d;
}

function annStep(cur,ad){
  if(cur===0) return annStep0(ad);
  if(cur===1) return annStep1(ad);
  if(cur===2) return annStep2(ad);
  if(cur===3) return annStep3(ad);
  if(cur===4) return annStep4(ad);
  return '';
}

function annNavBtns(){
  const cur=appState.annoncePage;
  return `<div class="nav-btns">
    ${cur>0?`<button class="btn-back" onclick="annGo(-1)">← Précédent</button>`:'<span></span>'}
    ${cur<ANN_STEPS.length-1
      ?`<button class="btn-next" onclick="annGo(1)">Suivant →</button>`
      :`<button class="btn-publish" onclick="annPublish()">✓ Publier l'annonce</button>`}

}

function handlePhotoFiles(files){
  if(!files||files.length===0) return;
  const MAX_SIZE = 10 * 1024 * 1024; // 10MB
  const allowed = ['image/jpeg','image/png','image/webp','image/gif'];
  let loaded = 0;
  const total = files.length;
  Array.from(files).forEach(file => {
    if(!allowed.includes(file.type)){
      showToast('⚠️ Format non supporté : '+file.name,'var(--red)');
      loaded++; return;
    }
    if(file.size > MAX_SIZE){
      showToast('⚠️ Fichier trop lourd : '+file.name+' (max 10Mo)','var(--red)');
      loaded++; return;
    }
    const reader = new FileReader();
    reader.onload = function(e){
      appState.annonceData.photos.push({
        id: Date.now() + Math.random(),
        name: file.name,
        dataUrl: e.target.result,
        size: file.size,
      });
      loaded++;
      if(loaded === total){
        annRefresh();
        showToast('✅ '+total+' photo'+( total>1?'s':'')+' ajoutée'+(total>1?'s':''),'var(--green)');
      }
    };
    reader.onerror = function(){
      showToast('Erreur lecture : '+file.name,'var(--red)');
      loaded++;
    };
    reader.readAsDataURL(file);
  });
}

let dragSrcId = null;
function dragPhotoStart(e, id){
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
}
function dragPhotoEnd(e, targetId){
  if(dragSrcId === null || dragSrcId === targetId) return;
  const photos = appState.annonceData.photos;
  const srcIdx = photos.findIndex(p=>p.id===dragSrcId);
  const tgtIdx = photos.findIndex(p=>p.id===targetId);
  if(srcIdx<0||tgtIdx<0) return;
  const [moved] = photos.splice(srcIdx,1);
  photos.splice(tgtIdx,0,moved);
  dragSrcId = null;
  annRefresh();
}

function annSetMainPhoto(id){
  const photos = appState.annonceData.photos;
  const idx = photos.findIndex(p=>p.id===id);
  if(idx<=0) return;
  const [photo] = photos.splice(idx,1);
  photos.unshift(photo);
  annRefresh();
  showToast('⭐ Photo principale mise à jour','var(--blue)');
}

function annValidate(){
  if(appState.page !== 'annonce') return true;
  const cur=appState.annoncePage;
  const ad=appState.annonceData;
  if(cur===0){
    if(!ad.type){showToast('⚠️ Sélectionnez un type de logement.','var(--red)');return false;}
    if(!ad.name.trim()||!ad.desc.trim()){showToast('⚠️ Remplissez le nom et la description.','var(--red)');return false;}
  }
  if(cur===1){
    if(!ad.address.trim()||!ad.city.trim()||!ad.zip.trim()){showToast('⚠️ Remplissez l\'adresse, ville et code postal.','var(--red)');return false;}
  }
  if(cur===3){
    if(!ad.price_night||ad.price_night<1){showToast('⚠️ Entrez un prix par nuit valide.','var(--red)');return false;}
  }
  if(cur===4){
    if(!ad.firstname.trim()||!ad.lastname.trim()||!ad.email.trim()){showToast('⚠️ Remplissez vos coordonnées.','var(--red)');return false;}
  }
  return true;
}

  if(!auth.currentUser){openModal('login');showToast('Connectez-vous pour sauvegarder des favoris','var(--blue)');return;}

    appState.favorites=appState.favorites.filter(x=>x!==hId);

  } else {
    appState.favorites.push(hId);

  }
  // refresh heart buttons in-place if on results page
  // Update all heart buttons in-place (no full re-render needed)
  const btn = document.getElementById('fav-btn-'+hId);
  if(btn) btn.textContent = getFavIcon(hId);

  const tabs=['toutes','confirmée','terminée','annulée'];
  const filt=appState.resaFilter||'toutes';
  const list=appState.reservations.filter(r=>filt==='toutes'||r.status===filt);
  const statusColor={confirmée:'#0d9e6e',terminée:'#6c757d',annulée:'#cc0000'};
  const statusBg={confirmée:'#e8f9f0',terminée:'#f1f3f5',annulée:'#fff0f0'};

  const d=document.createElement('div');
  d.innerHTML=`
  <div class="breadcrumb"><span onclick="navigate('home')">Accueil</span><span class="bc-sep">›</span><span>Mes réservations</span></div>
  <div style="max-width:1000px;margin:0 auto;padding:28px 20px 60px;">

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:28px;">
      <div>
        <h1 style="font-size:24px;font-weight:800;margin-bottom:4px;">📅 Mes réservations</h1>
        <p style="font-size:15px;color:var(--gray-500);">${appState.reservations.length} réservation${appState.reservations.length>1?'s':''} au total</p>
      </div>
      <button onclick="navigate('home')" style="background:var(--blue);color:#fff;padding:10px 20px;border-radius:var(--r-md);font-size:14px;font-weight:700;border:none;cursor:pointer;">+ Nouvelle réservation</button>
    </div>

    <!-- Stat cards -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;">
      ${[
        {label:'Total dépensé',val:appState.reservations.filter(r=>r.status!=='annulée').reduce((s,r)=>s+r.total,0).toLocaleString()+'€',icon:'💶',color:'var(--blue)'},
        {label:'Nuits réservées',val:appState.reservations.filter(r=>r.status!=='annulée').reduce((s,r)=>s+r.nights,0),icon:'🌙',color:'#8e44ad'},
        {label:'Confirmées',val:appState.reservations.filter(r=>r.status==='confirmée').length,icon:'✅',color:'var(--green)'},
        {label:'Terminées',val:appState.reservations.filter(r=>r.status==='terminée').length,icon:'🏁',color:'var(--gray-600)'},
      ].map(s=>`<div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:16px 18px;">
        <div style="font-size:22px;margin-bottom:8px;">${s.icon}</div>
        <div style="font-size:22px;font-weight:800;color:${s.color};">${s.val}</div>
        <div style="font-size:13px;color:var(--gray-500);margin-top:3px;">${s.label}</div>
      </div>`).join('')}
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:6px;margin-bottom:20px;border-bottom:2px solid var(--gray-200);padding-bottom:0;">
      ${tabs.map(t=>`<button onclick="appState.resaFilter='${t}';navigate('reservations')" style="padding:9px 18px;border:none;background:none;font-size:14px;font-weight:600;cursor:pointer;border-bottom:${filt===t?'2px solid var(--blue)':'2px solid transparent'};color:${filt===t?'var(--blue)':'var(--gray-500)'};margin-bottom:-2px;text-transform:capitalize;">${t==='toutes'?'Toutes':t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
    </div>

    <!-- List -->
    ${list.length===0?`<div style="text-align:center;padding:60px 20px;">
      <div style="font-size:52px;margin-bottom:14px;">📭</div>
      <h3 style="font-size:18px;font-weight:700;color:var(--gray-700);margin-bottom:8px;">Aucune réservation ${filt!=='toutes'?filt:''}</h3>
      <p style="color:var(--gray-500);">Explorez nos hébergements pour planifier votre prochain séjour.</p>
      <button onclick="navigate('home')" style="margin-top:16px;background:var(--blue-l);color:#fff;padding:10px 22px;border-radius:var(--r-md);font-size:15px;font-weight:700;border:none;cursor:pointer;">Explorer les hébergements</button>
    </div>`:list.map(r=>{
      const h=hotels.find(x=>x.id===r.hotelId)||{name:'Hébergement',emoji:'🏨',city:'—',country:'—'};
      const ci=new Date(r.checkIn).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
      const co=new Date(r.checkOut).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
      const isPast=new Date(r.checkOut)<new Date();
      return `<div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;transition:box-shadow .2s;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,.1)'" onmouseout="this.style.boxShadow='none'">
        <div style="display:flex;gap:0;flex-wrap:wrap;">
          <div style="width:180px;background:linear-gradient(135deg,#e8f4ff,#b3d4f0);display:flex;align-items:center;justify-content:center;font-size:56px;flex-shrink:0;min-height:130px;">
            ${h.emoji}
          </div>
          <div style="flex:1;padding:18px 20px;display:flex;gap:16px;flex-wrap:wrap;">
            <div style="flex:1;min-width:200px;">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                <span style="font-size:17px;font-weight:700;color:var(--blue-l);cursor:pointer;" onclick="navigate('detail',{selectedHotelId:${h.id}})">${h.name}</span>
                <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:${statusBg[r.status]};color:${statusColor[r.status]};">${r.status.toUpperCase()}</span>
              </div>
              <div style="font-size:13px;color:var(--gray-500);margin-bottom:10px;">📍 ${h.city}, ${h.country}</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
                <div style="background:var(--gray-50);border-radius:var(--r-sm);padding:8px 10px;">
                  <div style="font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;">Arrivée</div>
                  <div style="font-size:13px;font-weight:600;">${ci}</div>
                </div>
                <div style="background:var(--gray-50);border-radius:var(--r-sm);padding:8px 10px;">
                  <div style="font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;">Départ</div>
                  <div style="font-size:13px;font-weight:600;">${co}</div>
                </div>
              </div>
              <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--gray-500);">
                <span>🌙 ${r.nights} nuit${r.nights>1?'s':''}</span>
                <span>🛏️ ${r.rooms} chambre${r.rooms>1?'s':''}</span>
                <span>🔖 Réf: <code style="background:var(--gray-100);padding:1px 6px;border-radius:3px;">${r.id}</code></span>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;min-width:120px;">
              <div style="text-align:right;">
                <div style="font-size:22px;font-weight:800;color:var(--gray-900);">${r.total.toLocaleString()}€</div>
                <div style="font-size:12px;color:var(--gray-500);">Total TTC</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
                ${r.status==='confirmée'?`
                  <button onclick="navigate('detail',{selectedHotelId:${h.id}})" style="background:var(--blue-l);color:#fff;padding:7px 14px;border-radius:var(--r-md);font-size:13px;font-weight:700;border:none;cursor:pointer;">Voir l'hôtel</button>
                  <button onclick="cancelReservation('${r.id}')" style="background:#fff0f0;color:var(--red);padding:7px 14px;border-radius:var(--r-md);font-size:13px;font-weight:600;border:1px solid #ffcccc;cursor:pointer;">Annuler</button>
                `:''}
                ${r.status==='terminée'?`
                  <button onclick="navigate('detail',{selectedHotelId:${h.id}})" style="background:var(--gray-100);color:var(--gray-700);padding:7px 14px;border-radius:var(--r-md);font-size:13px;font-weight:600;border:1px solid var(--gray-300);cursor:pointer;">Laisser un avis</button>
                  <button onclick="navigate('detail',{selectedHotelId:${h.id}})" style="background:var(--blue-l);color:#fff;padding:7px 14px;border-radius:var(--r-md);font-size:13px;font-weight:700;border:none;cursor:pointer;">Réserver à nouveau</button>
                `:''}
                ${r.status==='annulée'?`
                  <span style="font-size:12px;color:var(--gray-400);">Remboursé le ${new Date(r.createdAt).toLocaleDateString('fr-FR')}</span>
                `:''}
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }).join('')}

    ${list.length>0?`<div style="margin-top:24px;background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-size:14px;font-weight:700;margin-bottom:3px;">Besoin d'aide avec une réservation ?</div>
        <div style="font-size:13px;color:var(--gray-500);">Notre équipe support est disponible 24h/24.</div>
      </div>
      <button style="background:var(--blue);color:#fff;padding:9px 18px;border-radius:var(--r-md);font-size:14px;font-weight:700;border:none;cursor:pointer;">💬 Contacter le support</button>
    </div>`:''}
  </div>`;
  return d;
}

function cancelReservation(id){
  if(!confirm('Êtes-vous sûr de vouloir annuler cette réservation ?')) return;
  const r=appState.reservations.find(x=>x.id===id);
  if(r){r.status='annulée';showToast('Réservation annulée','var(--red)');navigate('reservations');}
}

  const favHotels=hotels.filter(h=>appState.favorites.includes(h.id));

  const d=document.createElement('div');
  d.innerHTML=`
  <div class="breadcrumb"><span onclick="navigate('home')">Accueil</span><span class="bc-sep">›</span><span>Mes favoris</span></div>

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:28px;">

            <button onclick="toggleFavorite(${h.id});navigate('favoris')" title="Retirer des favoris" style="position:absolute;top:10px;right:10px;background:rgba(255,255,255,.9);border:none;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.15);">❤️</button>

              <button onclick="navigate('detail',{selectedHotelId:${h.id}})" style="background:var(--blue-l);color:#fff;padding:8px 14px;border-radius:var(--r-md);font-size:13px;font-weight:700;border:none;cursor:pointer;">Réserver</button>

/* ===================== MES ANNONCES ===================== */
function buildMesAnnonces(){
  if(!auth.currentUser){navigate('home');return document.createElement('div');}
  const list=appState.myAnnonces;
  const statusColor={publiée:'#0d9e6e','en attente':'#e6a800',suspendue:'#cc0000',brouillon:'#6c757d'};
  const statusBg={publiée:'#e8f9f0','en attente':'#fff8e0',suspendue:'#fff0f0',brouillon:'#f1f3f5'};

  const totalVues=list.reduce((s,a)=>s+a.stats.vues,0);
  const totalRev=list.reduce((s,a)=>s+a.stats.revenus,0);
  const totalResa=list.reduce((s,a)=>s+a.stats.reservations,0);
  const publiees=list.filter(a=>a.status==='publiée').length;

  const d=document.createElement('div');
  d.innerHTML=`

  <div style="max-width:1100px;margin:0 auto;padding:28px 20px 60px;">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:28px;">
      <div>
        <h1 style="font-size:24px;font-weight:800;margin-bottom:4px;">🏘️ Mes annonces</h1>
        <p style="font-size:15px;color:var(--gray-500);">${list.length} annonce${list.length>1?'s':''} · ${publiees} publiée${publiees>1?'s':''}</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button onclick="navigate('results')" style="background:#e8f9f0;color:var(--green);padding:10px 18px;border-radius:var(--r-md);font-size:13px;font-weight:700;border:1px solid #6bcf9e;cursor:pointer;">✈️ Vue voyageur</button>
        <button onclick="navigate('annonce')" style="background:var(--blue);color:#fff;padding:10px 20px;border-radius:var(--r-md);font-size:14px;font-weight:700;border:none;cursor:pointer;">+ Nouvelle annonce</button>
      </div>
    </div>

    <!-- Global stats -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:32px;">

        {icon:'👁️',val:totalVues.toLocaleString(),label:'Vues totales',color:'var(--blue)'},
        {icon:'📅',val:totalResa,label:'Réservations',color:'var(--green)'},
        {icon:'💶',val:totalRev.toLocaleString()+'€',label:'Revenus générés',color:'#8e44ad'},
        {icon:'🏘️',val:publiees+'/'+list.length,label:'Annonces actives',color:'var(--blue-l)'},

        <div style="font-size:13px;color:var(--gray-500);margin-top:3px;">${s.label}</div>
      </div>`).join('')}
    </div>

    <!-- Annonces list -->
    ${list.length===0?`
    <div style="text-align:center;padding:70px 20px;background:#fff;border-radius:var(--r-lg);border:1px solid var(--gray-200);">
      <div style="font-size:56px;margin-bottom:16px;">🏡</div>
      <h3 style="font-size:20px;font-weight:800;color:var(--gray-700);margin-bottom:8px;">Aucune annonce publiée</h3>

              ${a.status==='suspendue'||a.status==='en attente'?`<button onclick="toggleAnnonceStatus('${a.id}')" style="background:#e8f9f0;color:var(--green);padding:7px 14px;border-radius:var(--r-md);font-size:13px;font-weight:600;border:1px solid #a0e8c8;cursor:pointer;">▶ Republier</button>`:''}
              <button onclick="deleteAnnonce('${a.id}')" style="background:#fff0f0;color:var(--red);padding:7px 12px;border-radius:var(--r-md);font-size:13px;font-weight:600;border:1px solid #ffcccc;cursor:pointer;">🗑️</button>
            </div>
          </div>
        </div>
      </div>
      ${a.discount>0?`<div style="background:linear-gradient(90deg,#d40000,#ff4444);padding:10px 20px;font-size:13px;color:#fff;font-weight:700;border-top:none;display:flex;align-items:center;justify-content:space-between;"><span>🔥 Offre de dernière minute active — ${a.discount}% de réduction jusqu'au ${new Date(Date.now()+7*86400000).toLocaleDateString('fr-FR')}</span><button onclick="removePromo('${a.id}')" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:4px;padding:3px 10px;font-size:12px;cursor:pointer;">Retirer</button></div>`:''}
      ${a.status==='en attente'?`<div style="background:#fff8e0;padding:10px 20px;font-size:13px;color:#856404;border-top:1px solid #ffe080;">⏳ Votre annonce est en cours de vérification par notre équipe. Délai estimé : 24h.</div>`:''}
      ${a.status==='suspendue'?`<div style="background:#fff0f0;padding:10px 20px;font-size:13px;color:var(--red);border-top:1px solid #ffcccc;">⛔ Cette annonce est suspendue. Republier pour la rendre visible aux voyageurs.</div>`:''}
    </div>`).join('')}

  </div>`;
  return d;
}

function toggleAnnonceStatus(id){
  const a=appState.myAnnonces.find(x=>x.id===id);
  if(!a)return;
  if(a.status==='publiée'){a.status='suspendue';showToast('Annonce suspendue','var(--gray-700)');}
  else{a.status='publiée';showToast('✅ Annonce republiée !','var(--green)');}
  navigate('mesannonces');
}

function deleteAnnonce(id){
  if(!confirm('Supprimer définitivement cette annonce ?'))return;
  appState.myAnnonces=appState.myAnnonces.filter(x=>x.id!==id);
  showToast('Annonce supprimée','var(--red)');
  navigate('mesannonces');
}

function saveProfile(){
  const u = auth.currentUser;
  const first = document.getElementById('pf-first')?.value?.trim();
  const last  = document.getElementById('pf-last')?.value?.trim();
  if(!first||!last){showToast('⚠️ Prénom et nom obligatoires','var(--red)');return;}
  u.firstName = first;
  u.lastName  = last;
  u.phone     = document.getElementById('pf-phone')?.value?.trim()||u.phone;
  u.birthdate = document.getElementById('pf-birth')?.value||u.birthdate;
  u.country   = document.getElementById('pf-country')?.value||u.country;
  u.bio       = document.getElementById('pf-bio')?.value?.trim()||u.bio;
  // Update in users array
  const idx = auth.users.findIndex(x=>x.id===u.id);
  if(idx>=0) auth.users[idx] = {...auth.users[idx], ...u};
  appState.profilEditing = false;
  showToast('✅ Profil mis à jour !','var(--green)');
  navigate('profil');
  renderAuthArea();
}

function deleteAccount(){
  if(!confirm('Êtes-vous sûr ? Cette action est irréversible.')) return;
  auth.currentUser = null;
  appState.reservations = [];
  appState.favorites = [];
  appState.myAnnonces = [];
  showToast('Compte supprimé. À bientôt.','var(--gray-700)');
  navigate('home');
}

function updateExcTotal(price){
  const pax = parseInt(document.getElementById('exc-pax')?.value||1);
  const total = price * pax;
  const el = document.getElementById('exc-total-block');
  if(el) el.innerHTML = `
    <div style="display:flex;justify-content:space-between;font-size:14px;padding:3px 0;"><span>${price}€ × ${pax} personne${pax>1?'s':''}</span><span>${total}€</span></div>
    <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;padding-top:8px;border-top:2px solid var(--gray-200);margin-top:6px;"><span>Total</span><span>${total}€</span></div>`;
}

function bookExcursion(excId){
  if(!auth.currentUser){openModal('login');showToast('Connectez-vous pour réserver','var(--blue)');return;}
  const date = document.getElementById('exc-date')?.value;
  if(!date){showToast('⚠️ Choisissez une date','var(--red)');return;}
  const pax = parseInt(document.getElementById('exc-pax')?.value||1);
  const exc = excursions.find(x=>x.id===excId);
  const total = exc.price * pax;
  appState.pendingBooking = {type:'excursion',excId,title:exc.title,date,pax,total,emoji:exc.emoji,city:exc.city,country:exc.country};
  navigate('payment');
}

function toggleExcFavorite(excId){
  const key = 'exc-'+excId;
  if(!auth.currentUser){openModal('login');return;}
  if(appState.favorites.includes(key)){appState.favorites=appState.favorites.filter(x=>x!==key);showToast('Retiré des favoris','var(--gray-700)');}
  else{appState.favorites.push(key);showToast('❤️ Ajouté aux favoris !','#e74c3c');}
  navigate('excursion-detail');
}

function excSet(key, val){ appState.excursionFormData[key] = val; }
function excRefresh(){ const el=document.getElementById('exc-form-step'); if(el) el.innerHTML=excFormStep(appState.excursionFormPage||0, appState.excursionFormData); }
function excToggleLang(l){ const arr=appState.excursionFormData.language||[]; if(arr.includes(l)) appState.excursionFormData.language=arr.filter(x=>x!==l); else arr.push(l); excRefresh(); }
function excToggleInclude(id){ const arr=appState.excursionFormData.includes||[]; if(arr.includes(id)) appState.excursionFormData.includes=arr.filter(x=>x!==id); else arr.push(id); excRefresh(); }
function excSetHighlight(i,v){ if(!appState.excursionFormData.highlights) appState.excursionFormData.highlights=['','','','']; appState.excursionFormData.highlights[i]=v; }

function excFormValidate(){
  const fd = appState.excursionFormData;
  const cur = appState.excursionFormPage||0;
  if(cur===0){
    if(!fd.category){showToast('⚠️ Choisissez une catégorie','var(--red)');return false;}
    if(!fd.title?.trim()){showToast('⚠️ Ajoutez un titre','var(--red)');return false;}
    if(!fd.city?.trim()){showToast('⚠️ Indiquez la ville','var(--red)');return false;}
    if(!fd.description?.trim()||fd.description.length<50){showToast('⚠️ Description trop courte (min 50 car.)','var(--red)');return false;}
  }
  if(cur===2){
    if(!fd.price||fd.price<1){showToast('⚠️ Indiquez un prix valide','var(--red)');return false;}
    if(!fd.firstname?.trim()||!fd.lastname?.trim()||!fd.email?.trim()){showToast('⚠️ Remplissez vos coordonnées','var(--red)');return false;}
  }
  return true;
}

function excFormGo(dir){
  if(dir>0 && !excFormValidate()) return;
  appState.excursionFormPage = Math.max(0, Math.min(EXC_STEPS.length-1, (appState.excursionFormPage||0)+dir));
  navigate('excursion-form');
}

function excFormPublish(){
  if(!excFormValidate()) return;
  const fd = appState.excursionFormData;
  const cat = EXCURSION_CATS.find(c=>c.id===fd.category)||{icon:'✈️',label:'Excursion'};
  const newExc = {
    id:'MY-'+Math.random().toString(36).substr(2,8).toUpperCase(),
    ...fd, categoryLabel:cat.label, emoji:cat.icon,
    duration:(fd.duration||2)+(fd.durationUnit==='j'?' jour':'h'),
    status:'en attente', rating:0, reviews:0,

function updatePromoPreview(basePrice){
  const pct = parseInt(document.getElementById('promo-pct')?.value||20);
  const newPrice = Math.round(basePrice*(1-pct/100));
  const oldEl = document.getElementById('promo-old-price');
  const newEl = document.getElementById('promo-new-price');
  const badgeEl = document.getElementById('promo-badge');
  if(oldEl) oldEl.textContent = basePrice+'€';
  if(newEl) newEl.textContent = newPrice+'€';
  if(badgeEl) badgeEl.textContent = '-'+pct+'%';
}

function applyPromo(annonceId){
  const a = appState.myAnnonces.find(x=>x.id===annonceId);
  if(!a) return;
  const pct = parseInt(document.getElementById('promo-pct')?.value||20);
  const days = parseInt(document.getElementById('promo-duration')?.value||7);
  if(pct<5||pct>70){showToast('⚠️ Réduction entre 5% et 70%','var(--red)');return;}
  a.discount = pct;
  a.promoExpiry = new Date(Date.now()+days*86400000).toISOString().split('T')[0];
  document.getElementById('modal-root').innerHTML = '';
  showToast('🔥 Offre de dernière minute activée ! -'+pct+'%','#d40000');
  navigate('mesannonces');
}

function removePromo(annonceId){
  const a = appState.myAnnonces.find(x=>x.id===annonceId);
  if(!a) return;
  a.discount = 0;
  a.promoExpiry = null;
  document.getElementById('modal-root').innerHTML = '';
  showToast('Promotion retirée','var(--gray-700)');
  navigate('mesannonces');
}

function paySetMethod(m){
  appState.paymentData.method=m;
  const block=document.getElementById('pay-form-block');
  if(block) block.innerHTML=buildPayFormHTML(m,appState.paymentData,appState.pendingBooking?.total||0);
  ['card','paypal'].forEach(id=>{
    const el=document.getElementById('pm-'+id);
    if(!el) return;
    const active=id===m;
    el.style.borderColor=active?'var(--blue)':'var(--gray-200)';
    el.style.background=active?'rgba(0,53,128,.05)':'#fff';
    const lbl=el.querySelector('div:last-child');
    if(lbl&&lbl.style.borderRadius==='50%') lbl.style.display=active?'block':'none';
  });
}

function paySet(key,val){appState.paymentData[key]=val;}

function formatCardNumber(input){
  let v=input.value.replace(/\D/g,'').substring(0,16);
  input.value=v.replace(/(.{4})/g,'$1  ').trim();
  const icon=document.getElementById('card-brand-icon');
  if(!icon) return;
  if(v.startsWith('4')) icon.textContent='💙';
  else if(v.startsWith('5')) icon.textContent='🔴';
  else if(v.startsWith('3')) icon.textContent='🟢';
  else icon.textContent='💳';
}

function formatExpiry(input){
  let v=input.value.replace(/\D/g,'').substring(0,4);
  if(v.length>=2) v=v.substring(0,2)+' / '+v.substring(2);
  input.value=v;
}

function processPayment(){
  const pb=appState.pendingBooking;
  const pd=appState.paymentData;
  if(!pb) return;
  const method=pd.method||'card';
  if(method==='card'){
    if((pd.cardNumber||'').replace(/\s/g,'').length<16){showToast('⚠️ Numéro de carte invalide','var(--red)');return;}
    if(!(pd.cardName||'').trim()){showToast('⚠️ Nom sur la carte requis','var(--red)');return;}
    if((pd.expiry||'').length<7){showToast('⚠️ Date d\'expiration invalide','var(--red)');return;}
    if((pd.cvv||'').length<3){showToast('⚠️ CVV invalide','var(--red)');return;}
  } else if(method==='paypal'){
    if(!(pd.paypalEmail||'').includes('@')){showToast('⚠️ E-mail PayPal invalide','var(--red)');return;}
  }
  showPaymentProcessing(pb.total,method,()=>finalizeBooking(pb,method));
}

function showPaymentProcessing(total,method,onComplete){
  const methodLabels={card:'Carte bancaire',paypal:'PayPal'};
  const overlay=document.createElement('div');
  overlay.id='pay-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:var(--r-xl);padding:40px 36px;text-align:center;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);">
    <div id="pay-anim" style="font-size:52px;margin-bottom:16px;">🔒</div>
    <h3 style="font-size:20px;font-weight:800;margin-bottom:8px;" id="pay-status">Traitement en cours…</h3>
    <p style="font-size:14px;color:var(--gray-500);margin-bottom:20px;" id="pay-substatus">Connexion sécurisée</p>
    <div style="background:var(--gray-100);border-radius:20px;height:6px;overflow:hidden;">
      <div id="pay-bar" style="height:100%;background:var(--blue);border-radius:20px;width:0%;transition:width .4s;"></div>
    </div>
    <div style="margin-top:12px;font-size:13px;color:var(--gray-400);">${methodLabels[method]||method} · ${total}€</div>
  </div>`;
  document.body.appendChild(overlay);
  const steps=[[15,'🔒','Connexion sécurisée…','Chiffrement SSL 256 bits'],[35,'📡','Vérification 3D Secure…','Authentification en cours'],[60,'💳','Autorisation bancaire…','Communication avec votre banque'],[85,'✅','Validation du paiement…','Finalisation'],[100,'🎉','Paiement accepté !','Votre réservation est confirmée']];
  let i=0;
  const interval=setInterval(()=>{
    if(i>=steps.length){clearInterval(interval);setTimeout(()=>{overlay.remove();onComplete();},800);return;}
    const [pct,icon,status,sub]=steps[i];
    document.getElementById('pay-bar').style.width=pct+'%';
    document.getElementById('pay-anim').textContent=icon;
    document.getElementById('pay-status').textContent=status;
    document.getElementById('pay-substatus').textContent=sub;
    i++;
  },700);
}

function finalizeBooking(pb,method){
  const ref=(pb.type==='excursion'?'EXC':'SF')+'-'+Math.random().toString(36).substr(2,8).toUpperCase();
  const methodLabels={card:'Carte bancaire',paypal:'PayPal'};
  if(pb.type==='hotel'){
    const h=hotels.find(x=>x.id===pb.hotelId)||{name:'Hébergement',emoji:'🏨',city:'—',country:'—'};
    const comm=calcCommission(pb.total);
    appState.reservations.unshift({id:ref,hotelId:pb.hotelId,name:pb.name,email:pb.email,
      total:pb.total, commission:comm.commission, netToHost:comm.netToHost,
      checkIn:pb.checkIn||'',checkOut:pb.checkOut||'',rooms:pb.rooms||1,nights:pb.nights||1,
      status:'confirmée',paymentMethod:methodLabels[method]||method,
      createdAt:new Date().toISOString().split('T')[0]});
    appState.confirmedBooking={hotel:h,name:pb.name,email:pb.email,total:pb.total,
      commission:comm.commission,netToHost:comm.netToHost,
      checkIn:pb.checkIn,checkOut:pb.checkOut,rooms:pb.rooms,ref,paymentMethod:methodLabels[method]};
    appState.pendingBooking=null;
    navigate('confirm');
  } else {
    appState.excursionBookings.push({id:ref,excId:pb.excId,title:pb.title,date:pb.date,pax:pb.pax,total:pb.total,status:'confirmée',paymentMethod:methodLabels[method]||method,createdAt:new Date().toISOString().split('T')[0]});
    appState.pendingBooking=null;
    showPaymentSuccess(ref,pb.title,pb.total,methodLabels[method]||method);
  }
}

function getHostForHotel(hId){

  const h = hotels.find(x=>x.id===hId);

function sendMessage(convId){
  const input = document.getElementById('msg-input');
  const text = input?.value?.trim();
  if(!text) return;
  const conv = conversations.find(c=>c.id===convId);
  if(!conv) return;
  const isGuest = conv.guestId === auth.currentUser?.id;
  conv.messages.push({id:'M'+Date.now(), sender:isGuest?'guest':'host', text, at:new Date().toISOString()});
  conv.lastMessage = text;
  conv.lastAt = new Date().toISOString();
  // Auto reply after 1.5s
  setTimeout(()=>{
    const replies = ['Bonjour ! Merci pour votre message, je reviens vers vous très vite. 😊','Parfait, je note votre demande !','Bien sûr, cela me semble tout à fait possible.','Je vais vérifier les disponibilités et je vous confirme.'];
    const reply = replies[Math.floor(Math.random()*replies.length)];
    conv.messages.push({id:'M'+Date.now(), sender:isGuest?'host':'guest', text:reply, at:new Date().toISOString()});
    conv.lastMessage = reply;
    conv.lastAt = new Date().toISOString();
    navigate('conversation');
  },1500);
  navigate('conversation');
}
